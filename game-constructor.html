      markCb.addEventListener('click', (e) => e.stopPropagation());
      markCb.addEventListener('change', () => {
        if (markCb.checked) markedIds.add(it.id); else markedIds.delete(it.id);
        tr.classList.toggle('marked', markCb.checked);
        updateMarkCount();
      });
      markTd.appendChild(markCb);
      const sizeTd = tr.children[6];
      const sizeInput = document.createElement('input');
      sizeInput.type = 'number'; sizeInput.min = '26'; sizeInput.max = '200';
      sizeInput.value = it.h || DEFAULT_ITEM_H;
      sizeInput.style.width = '52px';
      sizeInput.addEventListener('change', () => {
        it.h = clamp(Math.round(Number(sizeInput.value) || DEFAULT_ITEM_H), 26, 200);
        sizeInput.value = it.h;
        save();
        const el = stageOuter.querySelector(`.item[data-id="${it.id}"]`);
        if (el && el._render) el._render();
      });
      sizeTd.appendChild(sizeInput);
      const boxTd = tr.children[7];
      const boxBtn = document.createElement('button');
      boxBtn.className = 'boxtoggle' + (it.box ? ' on' : '');
      boxBtn.textContent = it.box ? 'коробка ✓' : 'круглый/тюбик';
      boxBtn.onclick = () => { it.box = !it.box; save(); renderRows(); };
      boxTd.appendChild(boxBtn);
      const catTd = tr.children[8];
      const catBtn = document.createElement('button');
      catBtn.className = 'boxtoggle' + (it.cat ? ' on' : '');
      catBtn.textContent = it.cat ? '🐱 сбивает ✓' : 'декор';
      catBtn.onclick = () => { it.cat = !it.cat; save(); renderRows(); };
      catTd.appendChild(catBtn);
      tr.addEventListener('click', (e) => {
        if (e.target === boxTd || e.target === boxBtn || e.target === catTd || e.target === catBtn || e.target === sizeInput) return;
        selectedId = it.id;
        renderRows();
        [...stageOuter.querySelectorAll('.item')].forEach((n) => { n.classList.toggle('selected', n.dataset.id === selectedId); if (n._render) n._render(); });
      });
      tbody.appendChild(tr);
    });
    updateMarkCount();
  }

  function updateMarkCount() {
    const n = items.filter((it) => markedIds.has(it.id)).length;
    const el = root.querySelector('#ms-markCount');
    if (el) el.textContent = n;
  }

  function deleteItems(ids) {
    if (!ids.length) return;
    const set = new Set(ids);
    items = items.filter((it) => !set.has(it.id));
    ids.forEach((id) => markedIds.delete(id));
    if (set.has(selectedId)) selectedId = null;
    save();
    buildStage();
  }

  root.querySelector('#ms-delMarkedBtn').onclick = () => {
    const ids = items.filter((it) => markedIds.has(it.id)).map((it) => it.id);
    if (!ids.length) { alert('Отметьте галочками товары, которые нужно удалить.'); return; }
    deleteItems(ids);
  };

  root.querySelector('#ms-resetBtn').onclick = () => {
    if (!confirm('Удалить ВСЕ мобильные товары и этажи? Это нельзя отменить.')) return;
    markedIds.clear();
    items = [];
    tiers = [];
    save(); saveTiers();

  };

  // экспорт: px (в системе картинки NATIVE_W×NATIVE_H) -> %% — именно в %%
  // игра позиционирует товары на мобильном фоне (background-size:cover),
  // см. mobilePharmacistStyle в PharmacyView.vue для того же паттерна
  root.querySelector('#ms-copyBtn').onclick = () => {

    out += '// товары с «🐱 сбивает кот» -> SHELF_TOP_SLOTS_BY_PHARMACY_MOBILE (нужна доп. доработка CatsLayer.vue)\n';
    out += '// остальные -> SLOTS_BY_PHARMACY_MOBILE (ShelfDecorLayer.vue)\n\n';
    out += '// === SHELF_TOP_SLOTS_BY_PHARMACY_MOBILE ===\n';
    out += '1: [\n';
    items.filter((it) => it.cat).forEach((it) => {
      out += `  { id: '${it.id}', xPct: ${pct(it.x, NATIVE_W)}, yPct: ${pct(it.y, NATIVE_H)}, hPct: ${pct(it.h, NATIVE_H)}, img: SHELF_TOP_ITEMS[${it.img}]${it.box ? ', box: true' : ''}${it.rot ? ', rot: ' + it.rot : ''} },\n`;
    });
    out += '],\n\n';
    out += '// === SLOTS_BY_PHARMACY_MOBILE ===\n';
    out += '1: [\n';
    items.filter((it) => !it.cat).forEach((it) => {
      out += `  { id: '${it.id}', xPct: ${pct(it.x, NATIVE_W)}, yPct: ${pct(it.y, NATIVE_H)}, hPct: ${pct(it.h, NATIVE_H)}, img: ${it.img}${it.box ? ', box: true' : ''}${it.rot ? ', rot: ' + it.rot : ''} },\n`;
    });
    out += '],\n\n';
    out += '// === SHELF_SLOTS_BY_PHARMACY_MOBILE (нижняя полка, поштучно, сбивает КОТЁНОК) ===\n';
    out += '// новая структура — сейчас в CatsLayer.vue такого пока нет вообще (ни для десктопа,\n';
    out += '// ни для мобиле), нужна отдельная доработка knockShelfItem/shelfSlots под %%.\n';
    out += '1: [\n';
    kittenItems.forEach((it) => {
      out += `  { id: '${it.id}', xPct: ${pct(it.x, NATIVE_W)}, yPct: ${pct(it.y, NATIVE_H)}, img: ${it.img}${it.box ? ', box: true' : ''} },\n`;
    });
    out += '],\n';
    const el = root.querySelector('#ms-codeOut');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
  if (window.__mobShelfResizeHandler) window.removeEventListener('resize', window.__mobShelfResizeHandler);
  window.__mobShelfResizeHandler = () => buildStage();
  window.addEventListener('resize', window.__mobShelfResizeHandler);
}

  <div class="vprow">
    <label>Вьюпорт (телефон) — ширина <input type="number" id="mo-vpw" value="${state.viewportW}" min="280" max="900"></label>

  const stageOuter = root.querySelector('#mo-stageOuter');
  const vpwInput = root.querySelector('#mo-vpw');
  const vphInput = root.querySelector('#mo-vph');
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  // масштаб редактора: вписываем ВЕСЬ телефон-кадр в область (и по ширине, и по
  // высоте) — чтобы сцена была видна целиком. Раньше подгонялось только по ширине,
  // и высокий портретный кадр (896px) не влезал по вертикали → «не видно всю сцену».
  function getEditorScale() { return Math.min(320 / state.viewportW, 560 / state.viewportH, 1); }

  function buildStage() {
    const scale = getEditorScale();
    const outW = state.viewportW * scale, outH = state.viewportH * scale;
    stageOuter.style.width = outW + 'px';
    stageOuter.style.height = outH + 'px';
    stageOuter.innerHTML = '';

    const bgfit = document.createElement('div');
    bgfit.className = 'bgfit';
    const bgImg = document.createElement('img');
    bgImg.src = 'shelf-calibrate-assets/roomAI1-empty-mobile.jpg';
    bgfit.appendChild(bgImg);
    stageOuter.appendChild(bgfit);

    // Рамку «1200px мир» убрали: фармацевт/монитор/зона пола считаются от РЕАЛЬНОГО
    // экрана телефона (весь кадр = вьюпорт), а 1200-мир к ним отношения не имел и
    // только мешал (огромная рамка вылезала за телефон, «не видно всю сцену»).

    // ВАЖНО: фармацевт/монитор в игре — %-слой РЕАЛЬНОГО экрана (.pharmacy-content
    // = весь вьюпорт), а НЕ 1200px-мира. Поэтому боксы кладём в stageOuter и
    // считаем left/top от outW/outH (реальный экран), иначе горизонталь в
    // конструкторе не совпадала с игрой (leftPct считался от 1200-мира ≈ 3× шире).
    // фармацевт — НАСТОЯЩИЙ аватар (avatar1), а монитор — настоящий monitor.svg
    // из игры: сцена в конструкторе выглядит 1-в-1 как в игре, чтобы монитор было
    // видно «за столом» ровно так, как увидит игрок.
    makeCastBox('pharmacist', state.pharmacist, 'layout-calibrate-assets/avatar-sample.svg', 'фармацевт (аватар)', stageOuter, outW, outH);
    makeCastBox('monitor', state.monitor, 'layout-calibrate-assets/monitor.svg', 'монитор', stageOuter, outW, outH);
    makeFloorZone();
    renderReadouts();
  }

  function renderReadouts() {
    root.querySelector('#mo-pharmReadout').innerHTML =
      `<span>👤 фармацевт:</span> <span>left <b>${state.pharmacist.leftPct}%</b></span> <span>top <b>${state.pharmacist.topPct}%</b></span> <span>height <b>${state.pharmacist.heightPct}%</b></span>`;
    root.querySelector('#mo-monReadout').innerHTML =
      `<span>🖥️ монитор:</span> <span>left <b>${state.monitor.leftPct}%</b></span> <span>top <b>${state.monitor.topPct}%</b></span> <span>height <b>${state.monitor.heightPct}%</b></span>`;
    root.querySelector('#mo-floorReadout').innerHTML =
      `<span>xMin <b>${state.floor.xMinPct}%</b></span> <span>xMax <b>${state.floor.xMaxPct}%</b></span> <span>yMin <b>${state.floor.yMinPct}%</b></span> <span>yMax <b>${state.floor.yMaxPct}%</b></span>`;
  }

  // фармацевт/монитор — якорь left+top+height (translateX(-50%)), тащим
  // картинку целиком (двигает left/top) либо нижний кружок (меняет height)
  function makeCastBox(key, obj, imgSrc, label, parent, boxW, boxH) {
    const el = document.createElement('div');
    el.className = 'castbox';
    const tag = document.createElement('div'); tag.className = 'tag'; tag.textContent = label;
    el.appendChild(tag);
    const img = document.createElement('img'); img.src = imgSrc;
    el.appendChild(img);
    const rh = document.createElement('div'); rh.className = 'rh';
    el.appendChild(rh);
    parent.appendChild(el);

    function render() {
      const h = (obj.heightPct / 100) * boxH;
      el.style.height = h + 'px';
      el.style.left = ((obj.leftPct / 100) * boxW) + 'px';
      el.style.top = ((obj.topPct / 100) * boxH) + 'px';
      el.style.transform = 'translateX(-50%)';
    }
    render();

    let mode = null, startPX = 0, startPY = 0, start = {};
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      start = { leftPct: obj.leftPct, topPct: obj.topPct, heightPct: obj.heightPct };
      el.setPointerCapture(e.pointerId);
    }
    el.addEventListener('pointerdown', (e) => down(e, 'move'));
    rh.addEventListener('pointerdown', (e) => down(e, 'resize'));
    el.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const dxPct = ((e.clientX - startPX) / boxW) * 100;
      const dyPct = ((e.clientY - startPY) / boxH) * 100;
      if (mode === 'move') {
        obj.leftPct = clamp(+(start.leftPct + dxPct).toFixed(2), 0, 100);
        obj.topPct = clamp(+(start.topPct + dyPct).toFixed(2), 0, 95);
      } else if (mode === 'resize') {
        obj.heightPct = clamp(+(start.heightPct + dyPct).toFixed(2), 2, 90);
      }
      render();
      renderReadouts();
      save();
    });
    el.addEventListener('pointerup', () => { mode = null; });
  }

  // зона пола — прямо на внешнем кадре (реальный вьюпорт), 4 ручки-края, тот
  // же приём, что tierbox в «🛒 Полки-товары» / «📱 Мобильные полки»
  function makeFloorZone() {
    const el = document.createElement('div');
    el.className = 'floorzone';
    const label = document.createElement('div'); label.className = 'fz-label'; label.textContent = 'Зона пола';
    el.appendChild(label);
    const hL = document.createElement('div'); hL.className = 'th left';
    const hR = document.createElement('div'); hR.className = 'th right';
    const hT = document.createElement('div'); hT.className = 'th top';
    const hB = document.createElement('div'); hB.className = 'th bottom';
    el.appendChild(hL); el.appendChild(hR); el.appendChild(hT); el.appendChild(hB);
    stageOuter.appendChild(el);

    const outW = stageOuter.clientWidth, outH = stageOuter.clientHeight;
    function render() {
      const f = state.floor;
      el.style.left = ((f.xMinPct / 100) * outW) + 'px';
      el.style.width = (((f.xMaxPct - f.xMinPct) / 100) * outW) + 'px';
      el.style.top = ((f.yMinPct / 100) * outH) + 'px';
      el.style.height = (((f.yMaxPct - f.yMinPct) / 100) * outH) + 'px';
    }
    render();

    let mode = null, startPX = 0, startPY = 0, start = {};
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      start = Object.assign({}, state.floor);
      el.setPointerCapture(e.pointerId);
    }
    el.addEventListener('pointerdown', (e) => down(e, 'move'));
    hL.addEventListener('pointerdown', (e) => down(e, 'left'));
    hR.addEventListener('pointerdown', (e) => down(e, 'right'));
    hT.addEventListener('pointerdown', (e) => down(e, 'top'));
    hB.addEventListener('pointerdown', (e) => down(e, 'bottom'));
    el.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const f = state.floor;
      const dxPct = ((e.clientX - startPX) / outW) * 100;
      const dyPct = ((e.clientY - startPY) / outH) * 100;
      if (mode === 'move') {
        const w = start.xMaxPct - start.xMinPct, h = start.yMaxPct - start.yMinPct;
        f.xMinPct = clamp(+(start.xMinPct + dxPct).toFixed(2), 0, 100 - w);
        f.xMaxPct = f.xMinPct + w;
        f.yMinPct = clamp(+(start.yMinPct + dyPct).toFixed(2), 0, 100 - h);
        f.yMaxPct = f.yMinPct + h;
      } else if (mode === 'left') {
        f.xMinPct = clamp(+(start.xMinPct + dxPct).toFixed(2), 0, f.xMaxPct - 4);
      } else if (mode === 'right') {
        f.xMaxPct = clamp(+(start.xMaxPct + dxPct).toFixed(2), f.xMinPct + 4, 100);
      } else if (mode === 'top') {
        f.yMinPct = clamp(+(start.yMinPct + dyPct).toFixed(2), 0, f.yMaxPct - 4);
      } else if (mode === 'bottom') {
        f.yMaxPct = clamp(+(start.yMaxPct + dyPct).toFixed(2), f.yMinPct + 4, 100);
      }
      render();
      renderReadouts();
      save();
    });
    el.addEventListener('pointerup', () => { mode = null; });
  }

  vpwInput.addEventListener('change', () => {
    state.viewportW = clamp(Math.round(+vpwInput.value) || DEFAULTS.viewportW, 280, 900);
    save();
    buildStage();
  });
  vphInput.addEventListener('change', () => {
    state.viewportH = clamp(Math.round(+vphInput.value) || DEFAULTS.viewportH, 480, 1200);
    save();
    buildStage();
  });

  root.querySelector('#mo-resetBtn').onclick = () => {
    if (!confirm('Сбросить к значениям, которые сейчас в коде (стартовые приближения)?')) return;
    state = JSON.parse(JSON.stringify(DEFAULTS));
    save();
    vpwInput.value = state.viewportW;
    vphInput.value = state.viewportH;
    buildStage();
  };

  root.querySelector('#mo-copyBtn').onclick = () => {
    const p = state.pharmacist, m = state.monitor, f = state.floor;
    let out = '// вкладка «📱 Мобильная сцена» — фармацевт/монитор/зона пола для мобильного арта (аптека 1)\n\n';
    out += '// === PharmacyView.vue: MOBILE_PHARMACIST_POS / MOBILE_MONITOR_POS ===\n';
    out += `const MOBILE_PHARMACIST_POS = { 1: { leftPct: ${p.leftPct}, topPct: ${p.topPct}, heightPct: ${p.heightPct} } }\n`;
    out += `const MOBILE_MONITOR_POS = { 1: { leftPct: ${m.leftPct}, topPct: ${m.topPct}, heightPct: ${m.heightPct} } }\n\n`;
    out += `// === CatsLayer.vue: MOBILE_FLOOR_ZONE_PCT (откалибровано под вьюпорт ${state.viewportW}×${state.viewportH}) ===\n`;
    out += `const MOBILE_FLOOR_ZONE_PCT = { 1: { xMinPct: ${f.xMinPct}, xMaxPct: ${f.xMaxPct}, yMinPct: ${f.yMinPct}, yMaxPct: ${f.yMaxPct} } }\n`;
    const el = root.querySelector('#mo-codeOut');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
  if (window.__mobSceneResizeHandler) window.removeEventListener('resize', window.__mobSceneResizeHandler);
  window.__mobSceneResizeHandler = () => buildStage();
  window.addEventListener('resize', window.__mobSceneResizeHandler);
}

</script>
<script>
function renderTaskGamesTab(root) {
  // 4 реальных игровых цели заданий, снятые с dev2 под тестовым аккаунтом
  // (getTasks/getGames, аптека «Мимоза», см. src/constants/localGames.js) —
  // ВСЕ они target_type_id===1 («завершается при любом исходе»), поэтому
  // подходит любая из наших игр, но лучше — та, что доходит до конца сама.
  const TASKS = [
    { key: 'clean',    task: 'Задание 1', serverTitle: 'Наведи чистоту',   desc: 'Сыграйте в игру «Наведи чистоту» (стереть пятна)' },
    { key: 'bacteria', task: 'Задание 4', serverTitle: 'Победи бактерии',  desc: 'Сыграйте в игру «Победи бактерии»' },
    { key: 'tag',      task: 'Задание 5', serverTitle: 'Пятнашки',         desc: 'Сыграйте в игру «Пятнашки»' },
    { key: 'pill',     task: 'Задание 9', serverTitle: 'Поймай таблетку',  desc: 'Сыграйте в игру «Поймай таблетки»' },
  ];
  // Наши игры (см. getLocalGamesAppendix в src/constants/localGames.js) — с пометкой
  // надёжности завершения (проверено по коду: таймер/смерть = всегда доходит до
  // gameOver сама; головоломка = только когда игрок её решит, может «зависнуть»).
  const OUR_GAMES = [
    { key: 'shelf',      title: 'Расставь на полку',        reliable: true },
    { key: 'flappy',     title: 'Пролети через дозатор',    reliable: true },
    { key: 'snake',      title: 'Выпиши рецепт',            reliable: true },
    { key: 'stack',      title: 'Срок годности',            reliable: true },
    { key: 'pill_press', title: 'Таблеточный пресс',        reliable: true },
    { key: 'runner',     title: 'Беги, фармацевт',          reliable: true },
    { key: 'shelf_jump', title: 'Прыжок по полкам',         reliable: true },
    { key: 'sort',       title: 'Сортировка лекарств',      reliable: true },
    { key: 'zuma',       title: 'Зума: цепочка пилюль',     reliable: true },
    { key: 'pipes',      title: 'Соедини трубы',            reliable: false },
    { key: 'sling',      title: 'Рогатка против бактерий',  reliable: true },
    { key: 'water',      title: 'Прокопай канал',           reliable: true },
    { key: 'frogger',    title: 'Перебеги ленты',           reliable: true },
    { key: 'rush',       title: 'Раздвинь коробки',         reliable: false },
  ];
  function titleOf(key) { return OUR_GAMES.find((g) => g.key === key)?.title || key; }

  function defaultMap() {
    return { clean: 'stack', bacteria: 'sling', tag: 'runner', pill: 'flappy' };
  }

  root.innerHTML = `

  TASKS.forEach((t) => { if (!OUR_GAMES.some((g) => g.key === state[t.key])) state[t.key] = defaultMap()[t.key]; });

      const select = document.createElement('select');
      OUR_GAMES.forEach((g) => {

      warnNote.className = 'warn-note';
      function updateWarn() {

        updateWarn();
        save();
        updateOut();
      });
      updateWarn();
      const right = document.createElement('div');
      right.appendChild(select);
      right.appendChild(warnNote);
      card.appendChild(left);
      card.appendChild(right);
      rowsEl.appendChild(card);

    out += '}\n';

  };

  buildRows();
  updateOut();
}

      <div class="readout">dx = <b id="begdx-dxVal">0</b> px <span id="begdx-sideHint" style="color:var(--muted);font-weight:400"></span></div>
      <button class="fix-btn" id="begdx-fixBtn">✅ Зафиксировать эту позу</button>
    </div>
    <p class="hint">
      dx — смещение центра кота (по лапам) от центра миски в пикселях экрана (desktop-масштаб, взрослый кот).
      Отрицательное — левее миски, положительное — правее. Метка на коте — точка, которая должна встать
      рядом с меткой на миске, не поверх неё.
    </p>
  </div>

  <div class="panel">
    <div class="out-row">
      <b>Результат</b>
      <button class="copy-btn" id="begdx-copyBtn">📋 Скопировать результат</button>
      <button class="reset-btn" id="begdx-resetBtn">Сбросить всё</button>
    </div>
    <div class="out" id="begdx-out">{}</div>
  </div>
</div>
`;

  const FP = 'cats/lasttick-pixel-cats/full-pack/black/';
  // те же позы и родные размеры, что в игре (CatsLayer.vue: POSE_ROW / POSE_DIM)
  const POSES = [
    { key: 'begSitR',   label: 'Сидит, вправо', row: 39, w: 31, h: 32 },
    { key: 'begSitL',   label: 'Сидит, влево',  row: 41, w: 31, h: 32 },
    { key: 'begStandR', label: 'Стоит, вправо', row: 33, w: 43, h: 32 },
    { key: 'begStandL', label: 'Стоит, влево',  row: 35, w: 44, h: 32 },
  ];
  const LT_SCALE = 2.7; // тот же коэффициент, что в игре (взрослый кот, desktop)
  const BOWL_W = 72, BOWL_H = 37; // тот же bowlBaseSize() для desktop (>950px) в игре
  const DRINK_OFFSET = 78; // тот же drinkOffset для desktop в игре

  // уже применённые в игре значения BEG_DX (CatsLayer.vue) — базовая точка для режима
  // «Ест/пьёт»: там кот стартует ИМЕННО с этой позиции и от неё считается доп. смещение
  const BEG_DX_APPLIED = {
    food:  { begSitR: 67, begSitL: -65, begStandR: 80, begStandL: -73 },
    drink: { begSitR: 63, begSitL: -62, begStandR: 71, begStandL: -74 },
  };

  const STORAGE_KEY_BEG = 'ozongame_beg_calibration_v1';
  const STORAGE_KEY_EAT = 'ozongame_eat_calibration_v1';
  let stateBeg = loadFrom(STORAGE_KEY_BEG, {});
  let stateEat = loadFrom(STORAGE_KEY_EAT, {});
  let curPose = POSES[0].key;
  let curBowl = 'food';
  let curMode = 'beg'; // 'beg' | 'eat'

  function loadFrom(key, fallback) {
    try { const raw = localStorage.getItem(key); if (raw) return JSON.parse(raw); } catch {}
    return fallback;
  }
  function saveBeg() { try { localStorage.setItem(STORAGE_KEY_BEG, JSON.stringify(stateBeg)); } catch {} }
  function saveEat() { try { localStorage.setItem(STORAGE_KEY_EAT, JSON.stringify(stateEat)); } catch {} }
  // базовая позиция (dx от центра миски), с которой кот СТАРТУЕТ в текущем режиме
  function baseDx() {
    if (curMode === 'beg') return 0;
    return BEG_DX_APPLIED[curBowl]?.[curPose] || 0; // режим «ест» стартует с уже применённой позы «просит»
  }

  const stageEl = root.querySelector('#begdx-stage');
  const bowlEl = root.querySelector('#begdx-bowl');
  const bowlImgEl = root.querySelector('#begdx-bowlImg');
  const bowlMarkEl = root.querySelector('#begdx-bowlMark');
  const catEl = root.querySelector('#begdx-cat');
  const catMarkEl = root.querySelector('#begdx-catMark');
  const dxValEl = root.querySelector('#begdx-dxVal');
  const sideHintEl = root.querySelector('#begdx-sideHint');
  const posesEl = root.querySelector('#begdx-poses');
  const outEl = root.querySelector('#begdx-out');
  const floorLineEl = root.querySelector('#begdx-floorLine');

  const centerX = () => stageEl.clientWidth / 2;
  const floorY = 250; // условная линия пола в системе координат макета (px от верха .stage)

  function renderRuler() {
    // лёгкая линейка снизу для ориентира по пикселям
    for (let x = -300; x <= 300; x += 50) {
      const tick = document.createElement('div');
      tick.className = 'ruler-tick';
      tick.style.left = (centerX() + x) + 'px';
      tick.style.top = (floorY + 8) + 'px';
      tick.style.height = '6px';
      stageEl.appendChild(tick);
      const lbl = document.createElement('div');
      lbl.className = 'ruler-label';
      lbl.style.left = (centerX() + x) + 'px';
      lbl.style.top = (floorY + 16) + 'px';
      lbl.textContent = x;
      stageEl.appendChild(lbl);
    }
  }

  function activeState() { return curMode === 'beg' ? stateBeg : stateEat; }
  function activeSave() { return curMode === 'beg' ? saveBeg : saveEat; }

  function renderPoseButtons() {
    posesEl.innerHTML = '';
    const st = activeState();
    POSES.forEach((p) => {
      const btn = document.createElement('button');
      btn.className = 'pose-btn' + (p.key === curPose ? ' active' : '');
      btn.innerHTML = p.label + (st[curBowl] && st[curBowl][p.key] != null ? '<span class="done">✓</span>' : '');
      btn.onclick = () => { curPose = p.key; renderAll(); };
      posesEl.appendChild(btn);
    });
  }

  let dx = 0; // текущее смещение от центра миски

  function bowlCenterX() {
    return curBowl === 'drink' ? centerX() + DRINK_OFFSET : centerX();
  }

  function renderBowl() {
    bowlImgEl.src = curBowl === 'drink' ? 'cat-guide-img/bowl-drink-empty.svg' : 'cat-guide-img/bowl-empty.svg';
    bowlEl.style.left = bowlCenterX() + 'px';
    bowlEl.style.top = (floorY - BOWL_H) + 'px';
    bowlEl.style.width = BOWL_W + 'px';
    bowlEl.style.height = BOWL_H + 'px';
    bowlMarkEl.style.left = bowlCenterX() + 'px';
    bowlMarkEl.style.top = floorY + 'px';
  }

  function renderCat() {
    const pose = POSES.find((p) => p.key === curPose);
    catEl.src = FP + 'row-' + String(pose.row).padStart(2, '0') + '.gif';
    const w = pose.w * LT_SCALE, h = pose.h * LT_SCALE;
    const cx = bowlCenterX() + dx;
    catEl.style.width = w + 'px';
    catEl.style.height = h + 'px';
    catEl.style.left = (cx - w / 2) + 'px';
    catEl.style.top = (floorY - h) + 'px';
    catMarkEl.style.left = cx + 'px';
    catMarkEl.style.top = floorY + 'px';
    dxValEl.textContent = Math.round(dx);
    sideHintEl.textContent = dx < -4 ? '(кот левее миски)' : dx > 4 ? '(кот правее миски)' : '(кот прямо на миске — сдвиньте!)';
    sideHintEl.style.color = Math.abs(dx) < 4 ? '#e8635f' : 'var(--muted)';
  }

  function renderOut() {
    outEl.textContent = JSON.stringify({ beg: stateBeg, eat: stateEat }, null, 2);
  }

  function renderAll() {
    renderPoseButtons();
    renderBowl();
    renderCat();
    renderOut();
  }

  // применяем сохранённое значение при переключении позы/миски/режима, если уже зафиксировано;
  // иначе стартуем с базовой позиции текущего режима (0 для «просит», applied-beg для «ест»).
  // ВАЖНО: в режиме «ест» сохранённое число — это ДЕЛЬТА поверх applied-beg (см. fixBtn),
  // поэтому при загрузке её нужно ПРИБАВИТЬ к базовой позиции, а не подставлять как абсолютную.
  function loadCurrentDx() {
    const saved = activeState()[curBowl] && activeState()[curBowl][curPose];
    if (typeof saved !== 'number') { dx = baseDx(); return; }
    dx = curMode === 'eat' ? baseDx() + saved : saved;
  }

  root.querySelectorAll('.mode-toggle button').forEach((btn) => {
    btn.onclick = () => {
      root.querySelectorAll('.mode-toggle button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      curMode = btn.dataset.mode;
      loadCurrentDx();
      renderAll();
    };
  });

  root.querySelectorAll('.bowl-toggle button').forEach((btn) => {
    btn.onclick = () => {
      root.querySelectorAll('.bowl-toggle button').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      curBowl = btn.dataset.bowl;
      loadCurrentDx();
      renderAll();
    };
  });

  root.querySelectorAll('.nudge button').forEach((btn) => {
    btn.onclick = () => { dx += parseInt(btn.dataset.d, 10); renderCat(); };
  });

  root.querySelector('#begdx-fixBtn').onclick = () => {
    const st = activeState();
    st[curBowl] = st[curBowl] || {};
    // для режима «ест» сохраняем ДОПОЛНИТЕЛЬНОЕ смещение поверх уже применённой позы «просит»
    st[curBowl][curPose] = Math.round(dx - (curMode === 'eat' ? baseDx() : 0));
    activeSave()();
    renderAll();
  };

  root.querySelector('#begdx-resetBtn').onclick = () => {
    if (!confirm('Стереть всю калибровку (оба режима)?')) return;
    stateBeg = {}; stateEat = {}; saveBeg(); saveEat(); dx = baseDx(); renderAll();
  };

  root.querySelector('#begdx-copyBtn').onclick = async () => {
    const text = JSON.stringify({ beg: stateBeg, eat: stateEat }, null, 2);
    try { await navigator.clipboard.writeText(text); alert('Скопировано! Отправьте этот JSON в чат.'); }
    catch { alert('Не удалось скопировать — выделите текст ниже вручную.'); }
  };

  // перетаскивание кота мышью/пальцем прямо по сцене
  let dragging = false;
  function pointerX(e) { const t = e.touches?.[0] || e.changedTouches?.[0]; return t ? t.clientX : e.clientX; }
  catEl.addEventListener('mousedown', (e) => { dragging = true; e.preventDefault(); });
  catEl.addEventListener('touchstart', () => { dragging = true; }, { passive: true });
  stageEl.addEventListener('mousedown', (e) => { if (e.target === catEl) { dragging = true; } });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = stageEl.getBoundingClientRect();
    dx = (pointerX(e) - rect.left) - bowlCenterX();
    renderCat();
  });
  document.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    const rect = stageEl.getBoundingClientRect();
    dx = (pointerX(e) - rect.left) - bowlCenterX();
    renderCat();
  }, { passive: true });
  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  floorLineEl.style.top = floorY + 'px';
  renderRuler();
  loadCurrentDx();
  renderAll();
}

</script>

<div class="wrap">

  <div class="note">💡 Скачанный файл кладите в <code>src/assets/sounds/cats/</code> под тем же именем (оно уже подставлено в поле «Имя файла») — и после сборки игра подхватит новый звук.</div>

  <div class="panel" style="padding:14px 18px;margin-bottom:16px;">

      <button class="act" id="studio-micRefreshBtn">🔄 Обновить список</button>
    </div>
    <div class="status" id="studio-micStatus"></div>
  </div>

  <div class="scene-tabs" id="studio-sceneTabs"></div>
  <div id="studio-sceneRoot"></div>
</div>
`;

  const FP = 'cats/lasttick-pixel-cats/full-pack/';
  const AUDIO_DIR = 'cat-sound-picker-audio/';

  const SCENES = [
    {
      key: 'beg', label: '🐾 Скребёт лапой (просит еду)', anim: 'frames',
      poses: [
        { key: 'begSitR', label: 'Сидит вправо (39)' },
        { key: 'begSitL', label: 'Сидит влево (41)' },
        { key: 'begStandR', label: 'Стоит вправо (33)' },

    { key: 'meow2', label: '♪ Мяу — вариант 2', anim: 'none', sound: 'current_meow_var2.wav', target: 'meow-var2.wav' },
    { key: 'meow3', label: '♪ Мяу — вариант 3', anim: 'none', sound: 'current_meow_var3.wav', target: 'meow-var3.wav' },
    { key: 'pourFood', label: '🍽️ Насыпают корм', anim: 'none', sound: 'current_pour_food.wav', target: 'pour-food.wav' },
    { key: 'pourWater', label: '💧 Наливают воду', anim: 'none', sound: 'current_pour_water.wav', target: 'pour-water.wav' },
  ];

  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  const actx = new AudioCtx();
  const sceneTabsEl = root.querySelector('#studio-sceneTabs');
  const sceneRoot = root.querySelector('#studio-sceneRoot');
  let currentKey = SCENES[0].key;

  const micSelect = root.querySelector('#studio-micSelect');
  const micRefreshBtn = root.querySelector('#studio-micRefreshBtn');
  const micStatus = root.querySelector('#studio-micStatus');
  let selectedMicId = '';
  async function refreshMics() {
    try {
      micStatus.textContent = 'Ищу микрофоны…';
      micStatus.className = 'status';
      try {
        const probe = await navigator.mediaDevices.getUserMedia({ audio: true });
        probe.getTracks().forEach((t) => t.stop());
      } catch (e) { /* пользователь мог уже разрешить раньше — не критично, если проба не удалась */ }
      const devices = await navigator.mediaDevices.enumerateDevices();
      const mics = devices.filter((d) => d.kind === 'audioinput');
      micSelect.innerHTML = '';
      mics.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId;
        opt.textContent = d.label || `Микрофон ${i + 1}`;
        micSelect.appendChild(opt);
      });
      if (mics.length) {
        const preferred = mics.find((d) => /usb|external|blue|airpod|external/i.test(d.label));
        selectedMicId = (mics.find((d) => d.deviceId === selectedMicId) || preferred || mics[0]).deviceId;
        micSelect.value = selectedMicId;
        micStatus.textContent = `Найдено микрофонов: ${mics.length}. Выберите нужный в списке.`;
      } else {
        micStatus.textContent = 'Микрофоны не найдены.';
      }
    } catch (err) {
      micStatus.textContent = 'Не удалось получить список микрофонов: ' + err.message;
      micStatus.className = 'status err';
    }
  }
  micSelect.addEventListener('change', () => { selectedMicId = micSelect.value; });
  micRefreshBtn.addEventListener('click', refreshMics);
  navigator.mediaDevices?.addEventListener?.('devicechange', refreshMics);
  refreshMics();

  SCENES.forEach((s) => {
    const btn = document.createElement('button');
    btn.textContent = s.label;
    btn.dataset.key = s.key;
    btn.className = s.key === currentKey ? 'active' : '';
    btn.onclick = () => { currentKey = s.key; renderTabs(); renderScene(s); };
    sceneTabsEl.appendChild(btn);
  });
  function renderTabs() { [...sceneTabsEl.children].forEach((b) => b.classList.toggle('active', b.dataset.key === currentKey)); }

  function encodeWav(buffer) {
    const numCh = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
    const blockAlign = numCh * 2, dataSize = len * blockAlign;
    const out = new ArrayBuffer(44 + dataSize);
    const view = new DataView(out);
    function writeStr(off, s) { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); }
    writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeStr(8, 'WAVE');
    writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
    view.setUint16(22, numCh, true); view.setUint32(24, sr, true);
    view.setUint32(28, sr * blockAlign, true); view.setUint16(32, blockAlign, true); view.setUint16(34, 16, true);
    writeStr(36, 'data'); view.setUint32(40, dataSize, true);
    const chans = []; for (let c = 0; c < numCh; c++) chans.push(buffer.getChannelData(c));
    let off = 44;
    for (let i = 0; i < len; i++) {
      for (let c = 0; c < numCh; c++) {
        let v = Math.max(-1, Math.min(1, chans[c][i]));
        view.setInt16(off, v < 0 ? v * 0x8000 : v * 0x7fff, true);
        off += 2;
      }
    }
    return out;
  }

  function drawWave(canvas, buffer, trimStart, trimEnd, boost) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width = canvas.clientWidth * 2;
    const h = canvas.height = canvas.clientHeight * 2;
    ctx.clearRect(0, 0, w, h);
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / w);
    ctx.fillStyle = '#dbe7f0';
    for (let x = 0; x < w; x++) {
      let min = 1, max = -1;
      for (let i = 0; i < step; i++) {
        const idx = x * step + i;
        if (idx >= data.length) break;
        const v = Math.max(-1, Math.min(1, data[idx] * boost));
        if (v < min) min = v; if (v > max) max = v;
      }
      const y1 = (1 - max) * h / 2, y2 = (1 - min) * h / 2;
      ctx.fillRect(x, y1, 1, Math.max(1, y2 - y1));
    }
    const dur = buffer.duration;
    const x0 = (trimStart / dur) * w, x1 = (trimEnd / dur) * w;
    ctx.fillStyle = 'rgba(252,190,46,0.28)';
    ctx.fillRect(x0, 0, x1 - x0, h);
    ctx.fillStyle = '#f0ad1c';
    ctx.fillRect(x0 - 3, 0, 3, h);
    ctx.fillRect(x1, 0, 3, h);
  }

  async function loadBuffer(url) {
    const resp = await fetch(url + '?t=' + Date.now());
    const arr = await resp.arrayBuffer();
    return actx.decodeAudioData(arr);
  }

  function renderScene(scene) {
    sceneRoot.innerHTML = '';
    const link = { setPlaySound: null };

    let animCtl = null;
    if (scene.anim === 'frames') {
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = `
        <h2>Анимация</h2>
        <div class="pose-tabs" id="poseTabs"></div>
        <div class="stage">
          <div class="hit" id="hitTag">🔊 звук</div>
          <div class="cyc" id="cycTag">цикл 0/4</div>
          <img id="poseImg" src="" alt="поза" />
        </div>
        <div class="timeline" id="timeline"><div class="bar" id="timelineBar"></div><div class="marker" id="timelineMarker"></div></div>
        <div class="row"><label>Скорость кадра:</label><input type="range" id="frameMsSlider" min="40" max="150" step="5" value="80" /><span class="val" id="frameMsVal">80мс/кадр</span></div>
        <div class="row"><label>Повторов до замирания:</label><input type="range" id="repeatSlider" min="1" max="8" step="1" value="4" /><span class="val" id="repeatVal">4</span></div>
        <div class="row"><label>Сдвиг звука в цикле:</label><input type="range" id="offsetSlider" min="0" max="100" step="1" value="34" /><span class="val" id="offsetVal">34%</span></div>
        <div class="btnrow">
          <button class="act play" id="animLoopBtn">▶ Играть в цикле</button>
          <button class="act copy" id="animCopyBtn">📋 Скопировать код</button>
        </div>
        <textarea id="animCodeOut" readonly placeholder="Нажмите «Скопировать код»"></textarea>
        <div class="note" style="margin-top:12px;margin-bottom:0;">⚙️ Вкладки поз ниже — только для проверки «на глаз». Скорость/повторы/сдвиг — ОДНИ числа на все 4 позы сразу (в игре кот скребёт с одинаковой скоростью независимо от того, как встал).</div>
      `;
      sceneRoot.appendChild(panel);
      animCtl = setupBegAnim(scene, panel, link);
    } else if (scene.anim === 'gif') {
      const panel = document.createElement('div');
      panel.className = 'panel';
      panel.innerHTML = `<h2>Анимация</h2><div class="stage"><img src="${scene.gif}?t=${Date.now()}" alt="" /></div><div class="note" style="margin-bottom:0;">Родная гифка — скорость менять нельзя без извлечения кадров (как сделано для «Скребёт лапой»); если нужно и здесь — скажите, извлеку кадры и добавлю управление.</div>`;
      sceneRoot.appendChild(panel);
    }

    const soundPanel = document.createElement('div');
    soundPanel.className = 'panel';
    soundPanel.innerHTML = `
      <h2>Звук</h2>
      <canvas class="wave" id="wave"></canvas>
      <div class="trim-readout"><span id="tStart">0.00s</span><span id="tDur"></span><span id="tEnd">0.00s</span></div>
      <div class="row" style="margin-top:10px;"><label>Громкость (буст):</label><input type="range" id="gainSlider" min="100" max="2000" step="5" value="100" /><span class="val" id="gainVal">100%</span></div>
      <div class="btnrow">
        <button class="act play" id="playFull">▶ Целиком</button>
        <button class="act" id="playTrim">✂️ Обрезка</button>
        <button class="act rec" id="recBtn">🎙️ Записать новый дубль</button>
        <button class="act" id="revertBtn">↩️ Вернуть текущий из игры</button>
      </div>
      <div class="fname-row">
        <input type="text" id="fname" value="${scene.target}" />
        <button class="act copy" id="dlBtn">⬇ Скачать WAV</button>
      </div>
      <div class="status" id="soundStatus"></div>
    `;
    if (scene.anim === 'frames') {
      const applied = document.createElement('div');
      applied.className = 'note';
      applied.style.marginTop = '12px';
      applied.style.marginBottom = '0';
      applied.textContent = '🔊 Этот звук (с текущей обрезкой и громкостью) уже используется в проигрывании анимации выше — запишите дубль или подвиньте обрезку и сразу жмите «▶ Играть в цикле», перезагружать страницу не нужно.';
      soundPanel.appendChild(applied);
    }
    sceneRoot.appendChild(soundPanel);
    setupSoundEditor(scene, soundPanel, link);
  }

  function setupBegAnim(scene, panel, link) {
    const FRAME_COUNT = 11;
    const poseTabsEl = panel.querySelector('#poseTabs');
    const poseImg = panel.querySelector('#poseImg');
    const hitTag = panel.querySelector('#hitTag');
    const cycTag = panel.querySelector('#cycTag');
    const timelineBar = panel.querySelector('#timelineBar');
    const timelineMarker = panel.querySelector('#timelineMarker');
    const frameMsSlider = panel.querySelector('#frameMsSlider');
    const frameMsVal = panel.querySelector('#frameMsVal');
    const repeatSlider = panel.querySelector('#repeatSlider');
    const repeatVal = panel.querySelector('#repeatVal');
    const offsetSlider = panel.querySelector('#offsetSlider');
    const offsetVal = panel.querySelector('#offsetVal');

    let current = scene.poses[0].key;
    scene.poses.forEach((p) => {
      const btn = document.createElement('button');
      btn.textContent = p.label;
      btn.className = p.key === current ? 'active' : '';
      btn.dataset.key = p.key;
      btn.onclick = () => { current = p.key; renderPoseTabs(); showFrame(0); };
      poseTabsEl.appendChild(btn);
    });
    function renderPoseTabs() { [...poseTabsEl.children].forEach((b) => b.classList.toggle('active', b.dataset.key === current)); }
    function framePath(idx) { return `${FP}black/frames-${current}/f${String(idx).padStart(2, '0')}.png`; }
    function showFrame(idx) { poseImg.src = framePath(idx); }
    showFrame(0);

    function cycleMs() { return Number(frameMsSlider.value) * FRAME_COUNT; }
    frameMsSlider.addEventListener('input', () => { frameMsVal.textContent = frameMsSlider.value + 'мс/кадр'; });
    repeatSlider.addEventListener('input', () => { repeatVal.textContent = repeatSlider.value; });
    offsetSlider.addEventListener('input', () => { offsetVal.textContent = offsetSlider.value + '%'; updateMarker(); });
    function updateMarker() { timelineMarker.style.left = offsetSlider.value + '%'; }
    updateMarker();

    let getPlayFn = () => {};
    link.setPlaySound = (fn) => { getPlayFn = fn; };

    let rafId = null, loopStart = 0, lastIdx = -1, lastSoundCycle = -1;
    function frameLoop() {
      const frameMs = Number(frameMsSlider.value);
      const repeat = Number(repeatSlider.value);
      const cm = frameMs * FRAME_COUNT;
      const t = performance.now() - loopStart;
      const cycle = Math.floor(t / cm);
      const frozen = cycle >= repeat;
      const phase = t % cm;
      const idx = frozen ? 0 : Math.floor(phase / frameMs);
      if (idx !== lastIdx) { showFrame(idx); lastIdx = idx; }
      cycTag.textContent = frozen ? `😌 замер (после ${repeat})` : `цикл ${cycle + 1}/${repeat}`;
      timelineBar.style.width = frozen ? '0%' : (phase / cm * 100) + '%';
      const offsetMs = (Number(offsetSlider.value) / 100) * cm;
      if (!frozen && phase >= offsetMs && lastSoundCycle !== cycle) {
        lastSoundCycle = cycle;
        getPlayFn()();
        hitTag.classList.add('show');
        setTimeout(() => hitTag.classList.remove('show'), 180);
      }
      rafId = requestAnimationFrame(frameLoop);
    }
    function startLoop() { stopLoop(); loopStart = performance.now(); lastIdx = -1; lastSoundCycle = -1; rafId = requestAnimationFrame(frameLoop); }
    function stopLoop() { cancelAnimationFrame(rafId); rafId = null; timelineBar.style.width = '0%'; showFrame(0); }

    const loopBtn = panel.querySelector('#animLoopBtn');
    let playing = false;
    loopBtn.onclick = () => {
      playing = !playing;
      if (playing) { startLoop(); loopBtn.textContent = '⏸ Стоп'; loopBtn.classList.remove('play'); loopBtn.classList.add('stop'); }
      else { stopLoop(); loopBtn.textContent = '▶ Играть в цикле'; loopBtn.classList.add('play'); loopBtn.classList.remove('stop'); }
    };
    panel.querySelector('#animCopyBtn').onclick = () => {
      const out = `BEG_FRAME_MS = ${frameMsSlider.value} // скорость кадра — одна на все 4 позы\nBEG_REPEAT_COUNT = ${repeatSlider.value} // повторов до замирания — одна на все 4 позы\nBEG_SCRATCH_OFFSET_MS = ${Math.round((Number(offsetSlider.value) / 100) * cycleMs())} // = ${offsetSlider.value}% цикла — подобрано в мастерской`;
      const el = panel.querySelector('#animCodeOut');
      el.value = out; el.select();
      try { document.execCommand('copy'); } catch (e) {}
      if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
    };
    return panel;
  }

  function setupSoundEditor(scene, panel, link) {
    const canvas = panel.querySelector('#wave');
    const tStartEl = panel.querySelector('#tStart');
    const tEndEl = panel.querySelector('#tEnd');
    const tDurEl = panel.querySelector('#tDur');
    const gainSlider = panel.querySelector('#gainSlider');
    const gainVal = panel.querySelector('#gainVal');
    const fnameInput = panel.querySelector('#fname');
    const statusEl = panel.querySelector('#soundStatus');
    const recBtn = panel.querySelector('#recBtn');

    let buffer = null, trimStart = 0, trimEnd = 0, curSource = null;

    function setStatus(msg, isErr) { statusEl.textContent = msg || ''; statusEl.className = 'status' + (isErr ? ' err' : ''); }
    function boost() { return Number(gainSlider.value) / 100; }
    function updateReadout() {
      tStartEl.textContent = trimStart.toFixed(2) + 's';
      tEndEl.textContent = trimEnd.toFixed(2) + 's';
      tDurEl.textContent = '(' + (trimEnd - trimStart).toFixed(2) + 's)';
    }
    function redraw() { if (buffer) drawWave(canvas, buffer, trimStart, trimEnd, boost()); }
    function setBuffer(buf) { buffer = buf; trimStart = 0; trimEnd = buf.duration; updateReadout(); redraw(); }

    loadBuffer(AUDIO_DIR + scene.sound).then(setBuffer).catch((e) => setStatus('Не удалось загрузить текущий звук: ' + e.message, true));

    gainSlider.addEventListener('input', () => { gainVal.textContent = gainSlider.value + '%'; redraw(); });

    function stopCur() { if (curSource) { try { curSource.stop(); } catch (e) {} curSource = null; } }
    function playRange(s, e) {
      if (!buffer) return;
      // браузеры создают AudioContext в состоянии "suspended" и не разбудят
      // его сами — без явного resume() звук молча не звучит вообще, хотя
      // ошибок в консоли нет и клик по кнопке визуально "срабатывает"
      if (actx.state === 'suspended') actx.resume();
      stopCur();
      const src = actx.createBufferSource();
      src.buffer = buffer;
      const gain = actx.createGain();
      const dur = Math.max(0.02, e - s);
      const fade = Math.min(0.015, dur / 4);
      gain.gain.value = boost();
      src.connect(gain).connect(actx.destination);
      src.start(0, s, dur);
      curSource = src;
    }
    panel.querySelector('#playFull').onclick = () => playRange(0, buffer ? buffer.duration : 0);
    panel.querySelector('#playTrim').onclick = () => playRange(trimStart, trimEnd);
    if (link.setPlaySound) link.setPlaySound(() => () => playRange(trimStart, trimEnd));

    panel.querySelector('#revertBtn').onclick = () => {
      setStatus('Загружаю текущий звук из игры…');
      loadBuffer(AUDIO_DIR + scene.sound).then((buf) => { setBuffer(buf); setStatus('Восстановлен звук, который сейчас в игре.'); }).catch((e) => setStatus('Ошибка: ' + e.message, true));
    };

    let dragging = null;
    canvas.addEventListener('pointerdown', (e) => {
      if (!buffer) return;
      const rect = canvas.getBoundingClientRect();
      const t = ((e.clientX - rect.left) / rect.width) * buffer.duration;
      dragging = Math.abs(t - trimStart) < Math.abs(t - trimEnd) ? 'start' : 'end';
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!dragging || !buffer) return;
      const rect = canvas.getBoundingClientRect();
      const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      const t = x * buffer.duration;
      if (dragging === 'start') trimStart = Math.min(t, trimEnd - 0.03);
      else trimEnd = Math.max(t, trimStart + 0.03);
      trimStart = Math.max(0, trimStart); trimEnd = Math.min(buffer.duration, trimEnd);
      updateReadout(); redraw();
    });
    canvas.addEventListener('pointerup', () => { dragging = null; });
    canvas.addEventListener('pointerleave', () => { dragging = null; });

    let mediaRecorder = null;
    recBtn.onclick = async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
      try {
        setStatus('Запрашиваю доступ к микрофону…');
        const audioConstraints = selectedMicId ? { deviceId: { exact: selectedMicId } } : true;
        const stream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });
        const chunks = [];
        const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach((t) => t.stop());
          recBtn.textContent = '🎙️ Записать новый дубль';
          recBtn.classList.remove('recording');
          setStatus('Обрабатываю запись…');
          try {
            const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
            const arr = await blob.arrayBuffer();
            const buf = await actx.decodeAudioData(arr);
            setBuffer(buf);
            gainSlider.value = 100; gainVal.textContent = '100%';
            setStatus('Новый дубль записан — обрежьте нужный момент и скачайте.');
          } catch (err) { setStatus('Не получилось обработать запись: ' + err.message, true); }
        };
        mediaRecorder.start();
        recBtn.textContent = '⏹ Стоп';
        recBtn.classList.add('recording');
        setStatus('Идёт запись…');
      } catch (err) { setStatus('Нет доступа к микрофону: ' + err.message, true); }
    };

    panel.querySelector('#dlBtn').onclick = () => {
      if (!buffer) return;
      const sr = buffer.sampleRate;
      const s = Math.floor(trimStart * sr), e = Math.ceil(trimEnd * sr);
      const len = Math.max(1, e - s);
      const off = new OfflineAudioContext(1, len, sr);
      const trimmed = off.createBuffer(1, len, sr);
      const src0 = buffer.getChannelData(0).subarray(s, e);
      const g = boost();
      const boosted = new Float32Array(len);
      for (let i = 0; i < len; i++) boosted[i] = Math.max(-1, Math.min(1, src0[i] * g));
      trimmed.copyToChannel(boosted, 0);
      const gain = off.createGain();
      const durSec = len / sr, fade = Math.min(0.015, durSec / 4);
      gain.gain.setValueAtTime(0, 0); gain.gain.linearRampToValueAtTime(1, fade);
      gain.gain.setValueAtTime(1, Math.max(fade, durSec - fade)); gain.gain.linearRampToValueAtTime(0, durSec);
      const src = off.createBufferSource();
      src.buffer = trimmed; src.connect(gain).connect(off.destination); src.start();
      off.startRendering().then((rendered) => {
        const wav = encodeWav(rendered);
        const blob = new Blob([wav], { type: 'audio/wav' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fnameInput.value.trim() || scene.target;
        a.click();
      });
    };
  }

  renderScene(SCENES[0]);
}

</script>

<header>
  <div class="kicker">Ozon Game · новый функционал</div>
  <h1>🐱 Аптечный кот</h1>
  <p>Живой кот-тамагочи, который постоянно обитает на экране аптеки вместе с фармацевтом. Это не отдельная мини-игра с началом и концом — кот живёт в аптеке всегда, за ним можно ухаживать, его можно гладить, кормить, покупать новых котов и даже приручать уличных.</p>
  <span class="badge">Демонстрация функционала для заказчика</span>
</header>

<div class="wrap">

  <h2><span class="n">1</span> Что это и зачем</h2>
  <p class="lead">Постоянный «питомец» на главном экране аптеки. Он делает экран живым, даёт игроку эмоциональную привязанность и повод возвращаться в игру каждый день (покормить, погладить, посмотреть, что кот натворил).</p>
  <div class="card">
    <img class="shot" src="cat-guide-img/scene-overview.png" alt="Кот в аптеке">
    <div class="cap">Кот живёт в аптеке рядом с фармацевтом. У него есть миска, он гуляет, спит, шалит и просит еду.</div>
  </div>

  <h2><span class="n">2</span> Где кот может находиться</h2>
  <p class="lead">У кота есть чётко заданное «поле» и три зоны. Он никогда не заходит на кнопки меню и на панель покупок — только в свободное пространство по центру.</p>
  <div class="card">
    <svg viewBox="0 0 900 380" style="width:100%;height:auto;border-radius:12px;background:#0d1520">
      <!-- меню слева -->
      <rect x="20" y="40" width="150" height="320" rx="12" fill="#dfe8ef"/>
      <text x="95" y="205" text-anchor="middle" font-size="15" fill="#7c8b99" font-family="Comfortaa">меню</text>
      <!-- покупки справа -->
      <rect x="730" y="40" width="150" height="320" rx="12" fill="#f7ecc4"/>
      <text x="805" y="205" text-anchor="middle" font-size="15" fill="#a9852f" font-family="Comfortaa">покупки</text>
      <!-- окно -->
      <rect x="330" y="30" width="240" height="120" rx="8" fill="#bfe6ff" stroke="#fff" stroke-width="6"/>
      <!-- фармацевт -->
      <ellipse cx="450" cy="150" rx="42" ry="70" fill="#cfe0ee"/>
      <circle cx="450" cy="95" r="26" fill="#f2c9a0"/>
      <text x="450" y="235" text-anchor="middle" font-size="12" fill="#5c6b7a" font-family="Comfortaa">фармацевт</text>
      <!-- прилавок -->
      <rect x="250" y="240" width="400" height="60" rx="6" fill="#e3cfa0"/>
      <text x="450" y="277" text-anchor="middle" font-size="14" fill="#7a5c28" font-family="Comfortaa" font-weight="700">ПРИЛАВОК</text>
      <!-- зоны -->
      <rect x="185" y="300" width="530" height="66" rx="10" fill="rgba(47,178,122,.12)" stroke="#2fb27a" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="200" y="326" font-size="13" fill="#1c8158" font-family="Comfortaa" font-weight="700">🟢 ПОЛ — гуляет, спит, шалит (всё поле)</text>
      <rect x="255" y="216" width="330" height="34" rx="8" fill="rgba(79,147,214,.14)" stroke="#4f93d6" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="270" y="238" font-size="12" fill="#2f6fab" font-family="Comfortaa" font-weight="700">🔵 СТОЛ — запрыгивает (перед фармацевтом)</text>
      <rect x="332" y="120" width="236" height="34" rx="8" fill="rgba(252,190,46,.18)" stroke="#f0ad1c" stroke-width="2" stroke-dasharray="6 5"/>
      <text x="345" y="142" font-size="12" fill="#8a6300" font-family="Comfortaa" font-weight="700">🟠 ОКНО — запрыгивает (за фармацевтом)</text>
    </svg>
    <ul class="clean" style="margin-top:14px">
      <li><span class="pill p-green">Пол</span> основное поле. Кот свободно ходит по всей ширине между меню и покупками, ложится и спит в разных местах, шалит.</li>
      <li><span class="pill p-blue">Стол (прилавок)</span> кот иногда <b>запрыгивает по дуге</b> на столешницу и сидит там. Он находится <b>перед</b> фармацевтом (стол ближе к зрителю).</li>
      <li><span class="pill p-orange">Окно (подоконник)</span> кот иногда запрыгивает погреться на солнце. Подоконник <b>за</b> фармацевтом, поэтому кот уходит <b>за</b> её фигуру — как в реальной комнате.</li>
    </ul>
    <div class="note" style="margin-top:12px"><b>Правило захода:</b> на стол и окно кот забирается <b>сам и редко</b> — это не постоянное место, а «настроение». Сначала он подходит по полу к нужной точке, затем прыгает (взлёт + полёт, а не телепорт), сидит 5–9 секунд и спрыгивает обратно. Сытый/толстый кот прыгает реже.</div>
  </div>

  <h2><span class="n">3</span> Анимации и позы</h2>
  <p class="lead">Кот использует пиксельные спрайты. Одна и та же порода умеет ходить, стоять, бегать, спать, лежать и шипеть.</p>
  <div class="grid g3">
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-21.gif"><b>Ходьба</b><small>перемещение по полю</small></div>
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-09.gif"><b>Ожидание</b><small>стоит, оглядывается</small></div>
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-05.gif"><b>Бег / прыжок</b><small>убегает, запрыгивает</small></div>
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-17.gif"><b>Сон</b><small>спит на полу</small></div>
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-08.gif"><b>Лежит</b><small>греется на солнце</small></div>
    <div class="tile"><img class="sprite" src="cats/lasttick-pixel-cats/anims/gif-03.gif"><b>Шипит</b><small>если его прогнать</small></div>
  </div>

  <h2><span class="n">4</span> Показатели кота</h2>
  <p class="lead">У каждого кота четыре показателя, которые меняются в реальном времени — даже пока игрок не в игре.</p>
  <div class="card">
    <div class="stat-row"><div class="stat-ico">🍽️</div><b style="width:90px">Сытость</b><div class="bar"><i style="width:70%;background:var(--green)"></i></div></div>
    <div class="stat-row"><div class="stat-ico">💧</div><b style="width:90px">Жажда</b><div class="bar"><i style="width:60%;background:#35b5c9"></i></div></div>
    <div class="stat-row"><div class="stat-ico">😊</div><b style="width:90px">Настроение</b><div class="bar"><i style="width:70%;background:var(--yellow)"></i></div></div>
    <div class="stat-row"><div class="stat-ico">⚖️</div><b style="width:90px">Вес</b><div class="bar"><i style="width:30%;background:#a9865a"></i></div></div>
    <ul class="clean" style="margin-top:14px">
      <li><b>Сытость</b> медленно падает. Когда кот голоден — идёт к миске с едой и просит.</li>
      <li><b>Жажда</b> падает чуть быстрее сытости. Когда кот хочет пить — идёт к миске с питьём.</li>
      <li><b>Настроение</b> падает со временем, растёт когда кота гладят, он греется на солнце или ухожен. Домик и игрушка замедляют падение настроения.</li>
      <li><b>Вес</b> растёт от переедания и падает от активности. <b>Толстый кот</b> становится ленивым — больше лежит и спит, меньше гуляет. Как только похудеет — снова активен.</li>
    </ul>
    <div class="note" style="margin-top:12px"><b>Баланс ухода:</b> показатели падают неспеша, чтобы забота не отвлекала от основной игры, но кот всё же требует внимания — иначе неинтересно. Кормить и поить — <b>один клик по миске</b>, без лишних кнопок.</div>
  </div>

  <h2><span class="n">5</span> Две миски: еда и питьё</h2>
  <p class="lead">У каждого кота <b>две миски рядом</b>: для еды и для питья. Ставятся вместе одним действием, наполняются кликом.</p>
  <div class="grid g3">
    <div class="card" style="text-align:center">
      <img src="cats/bowls/classic-full-preview.png" style="height:64px"><br>
      <b>🍚 Еда</b>
      <p class="lead" style="margin-top:6px">Клик по миске насыпает корм. Утоляет <b>весь голод</b>. Бесплатно.</p>
    </div>
    <div class="card" style="text-align:center">
      <img src="cats/bowls/drink-water.svg" style="height:64px"><br>
      <b>💧 Вода</b>
      <p class="lead" style="margin-top:6px">Клик наливает воду. Утоляет <b>всю жажду</b>. Бесплатно.</p>
    </div>
    <div class="card" style="text-align:center">
      <img src="cats/bowls/drink-milk.svg" style="height:64px"><br>
      <b>🥛 Молоко</b>
      <p class="lead" style="margin-top:6px">Клик по миске с водой ещё раз — превращает её в молоко (за монеты). Утоляет <b>всю жажду + треть голода</b>, но чуть полнит.</p>
    </div>
  </div>
  <div class="note">Выбор для игрока: быстро налить воды <b>даром</b> или угостить <b>молоком</b> — сытнее, но платно и слегка добавляет вес. Если кормить сытого кота — он переедает и толстеет.</div>

  <h2><span class="n">6</span> Взаимодействие с котом</h2>
  <div class="grid g3">
    <div class="tile" style="text-align:left"><div style="font-size:30px">🖐️➡️♥️</div><b>Погладить</b><small>Клик по коту поднимает настроение и иногда приносит монетку. Кот мурлычет.</small></div>
    <div class="tile" style="text-align:left"><div style="font-size:30px">📦</div><b>Шалости</b><small>Хулиган иногда «сбивает» коробку. Её можно подобрать кликом; если не убрать — она сама исчезнет.</small></div>
    <div class="tile" style="text-align:left"><div style="font-size:30px">😾</div><b>Прогнать</b><small>Если кликнуть кота в момент шалости — он зашипит и убежит.</small></div>
  </div>
  <div class="note" style="margin-top:12px"><b>Про звук:</b> кот <b>только мяукает</b> (человеческих слов нет). Мяуканье негромкое и не чаще, чем раз в 7 секунд, чтобы не раздражать — даже когда голодны несколько котов сразу.</div>

  <h2><span class="n">7</span> Монеты и экономика</h2>
  <div class="card">
    <ul class="clean">
      <li>🪙 Монеты капают <b>пассивно</b>, пока кот в аптеке.</li>
      <li>🪙 <b>+1</b> иногда за поглаживание кота.</li>
      <li>Монеты тратятся в магазине: на новых котят, аксессуары и на приманку для уличных котов.</li>
    </ul>
  </div>

  <h2><span class="n">8</span> Как появляются коты</h2>
  <p class="lead">Прогрессия: сначала «поднимаем» первого кота, и только потом можно заводить новых.</p>
  <div class="grid g3">
    <div class="card">
      <b>🚪 Первый кот — приходит сам</b>
      <p class="lead" style="margin-top:6px">Его не покупают: он появляется <b>у двери аптеки</b> — мокрый, голодный и жаждущий, но с ошейником. Порода случайная. Показывается модалка знакомства.</p>
    </div>
    <div class="card">
      <b>🐈 Купить котёнка</b>
      <p class="lead" style="margin-top:6px">Доступно, только когда первый кот <b>вырос до взрослого</b>. Из магазина можно взять кота <b>любой</b> породы (даже такой, как уже есть). Без драматичной модалки — мы же его просто купили.</p>
    </div>
    <div class="card">
      <b>🐾 Найти на улице</b>
      <p class="lead" style="margin-top:6px">Тоже открывается после взросления первого. Порода уличного <b>случайная и не повторяет</b> уже имеющихся котов. Его нужно приручить (кормить → доверие → поймать).</p>
    </div>
  </div>
  <div class="note" style="margin-top:12px">Пока первый кот не вырос, кнопки «Купить» и «На улице» заблокированы с понятной подсказкой — это ведёт игрока по прогрессии, а не заваливает выбором сразу.</div>

  <h2><span class="n">8а</span> Аксессуары</h2>
  <div class="grid g2">
    <div class="card">
      <b>🐈 Внешность и характер</b>
      <p class="lead" style="margin-top:6px">У кота есть порода (внешность) и характер (поведение). Коты не слипаются на экране — расходятся, чтобы каждый был виден.</p>
    </div>
    <div class="card">
      <b>🛒 Аксессуары</b>
      <table>
        <tr><th>Предмет</th><th>Эффект</th></tr>
        <tr><td>🧶 Игрушка</td><td>кот играет, настроение падает медленнее</td></tr>
        <tr><td>🛏️ Лежанка</td><td>место для отдыха</td></tr>
        <tr><td>🏠 Домик</td><td>сильно замедляет падение настроения</td></tr>
      </table>
    </div>
  </div>
  <div class="card" style="margin-top:14px">
    <img class="shot" src="cat-guide-img/care-panel.png" alt="Панель ухода за котами">
    <div class="cap">Панель ухода (кнопка 🐾): показатели всех котов, покупка котят и аксессуаров, поиск уличных котов.</div>
  </div>

  <h2><span class="n">9</span> Характеры котов</h2>
  <div class="grid g3">
    <div class="tile" style="text-align:left"><b>😼 Хулиган</b><small>Много гуляет и шалит — сбивает коробки.</small></div>
    <div class="tile" style="text-align:left"><b>😴 Лежебока</b><small>Любит греться и спать, но тоже гуляет.</small></div>
    <div class="tile" style="text-align:left"><b>🥺 Попрошайка</b><small>Активно гуляет и чаще просит еду.</small></div>
  </div>

  <h2><span class="n">10</span> Уличные коты (приручение)</h2>
  <p class="lead">Кроме покупки, кота можно <b>найти и приручить на улице</b> — это отдельная механика с элементом риска.</p>
  <div class="card">
    <table>
      <tr><th>Шаг</th><th>Что происходит</th></tr>
      <tr><td>🐾 Искать на улице</td><td>с некоторым шансом появляется бездомный кот (иначе — короткий кулдаун).</td></tr>
      <tr><td>🥫 Покормить (за монеты)</td><td>каждое кормление повышает <b>доверие</b> кота.</td></tr>
      <tr><td>🎯 Поймать</td><td>доступно при достаточном доверии. Чем выше доверие — тем выше шанс поймать.</td></tr>
      <tr><td>❌ Неудача</td><td>кот пугается, доверие падает, придётся ждать и приручать заново.</td></tr>
    </table>
    <div class="note" style="margin-top:12px">Пойманный уличный кот вбегает в аптеку через анимацию и становится полноценным питомцем — с породой, которой ещё нет у игрока.</div>
  </div>

  <h2><span class="n">11</span> Сохранение и «жизнь без игрока»</h2>
  <div class="card">
    <ul class="clean">
      <li>Все коты, их показатели, монеты и покупки <b>сохраняются</b> на устройстве игрока.</li>
      <li>Пока игрок не в игре, время идёт «по-настоящему»: вернувшись, он увидит, что кот успел проголодаться и заскучать — как настоящий питомец.</li>
    </ul>
  </div>

  <h2><span class="n">12</span> Миска и возраст кота</h2>
  <div class="card">
    <ul class="clean">
      <li><b>Миску можно ставить куда угодно.</b> Как только кот появляется, включается режим установки: кликните по полу — и миска встанет в это место (можно переставить в любой момент кнопкой 🥣 в панели ухода).</li>
      <li><b>4 стадии взросления:</b> котёнок → подросток → взрослый → пожилой. Кот растёт в реальном времени (в том числе пока игрок офлайн), с возрастом меняется размер и вид кота.</li>
    </ul>
  </div>

  <h2><span class="n">13</span> Имя и история кота</h2>
  <p class="lead">Кот — не просто спрайт, а <b>персонаж со своей судьбой</b>: у каждого есть имя и предыстория, которую игрок узнаёт постепенно. Это создаёт эмоциональную привязанность.</p>
  <div class="card">
    <ul class="clean">
      <li><b>Появление с историей.</b> Прежде чем кот окажется в аптеке, показывается модалка: как он к нам попал (промок под дождём, принесла соседка и т.п.), его имя и картинка котёнка.</li>
      <li><b>Имена</b> выбираются случайно — обычные (Барсик, Мурзик) и «богатые» (Барон фон Мурр, Сэр Уискерс).</li>
      <li><b>Главы истории</b> открываются по мере взросления кота — их можно перечитать в «книге истории» (кнопка 📖).</li>
      <li><b>Ошейник и объявление.</b> Если у кота есть ошейник — значит, у него был хозяин. Можно <b>дать объявление в газету</b> о пропаже: через некоторое время хозяин откликнется, и игрок решает — вернуть кота или оставить себе.</li>
      <li><b>Инвестор.</b> Например, потерянный котик оказывается любимцем состоятельного человека — вернув (или выходив) его, аптека получает щедрого инвестора и рост дохода. Есть и другие сюжеты: сбежавший от плохих хозяев, звезда рекламы, бабушкин кот.</li>
    </ul>
    <div class="note" style="margin-top:12px">Каждая история — это выбор с последствиями (награда, доход аптеки, судьба кота), поэтому игроку не всё равно, что будет с питомцем.</div>

<script>
/* ============================================================
   🐛 Обратная связь — читает отзывы/баг-репорты, которые игроки
   отправляют из самой игры (FeedbackWidget.vue → POST pharmacy-game/feedback).
   Эндпоинт пока БЕЗ авторизации (как и весь пользовательский pharmacy-game —
   см. вкладку «Статус проекта», раздел 6, п.10), поэтому читаем напрямую GET-ом,
   без токена. База — dev2 (единственный реальный бэкенд на сейчас).
   ============================================================ */
function renderFeedbackTab(root) {
  root.innerHTML = `
<style>
  .tab-feedback{margin:0;font-family:'Comfortaa',system-ui,sans-serif;color:var(--ink);background:var(--bg2);padding:20px;}
  .tab-feedback .wrap{max-width:1000px;margin:0 auto;}
  .tab-feedback h1{font-size:22px;margin:0 0 4px;}
  .tab-feedback .sub{opacity:.7;font-size:13px;margin-bottom:16px;}
  .tab-feedback .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .tab-feedback input[type=text]{flex:1;min-width:220px;padding:8px 10px;border-radius:8px;border:1px solid var(--line,#ccd);font-family:inherit;font-size:13px;}
  .tab-feedback button{padding:8px 14px;border-radius:8px;border:none;background:#27384a;color:#fff;font-family:inherit;font-size:13px;cursor:pointer;}
  .tab-feedback button:hover{background:#33475e;}
  .tab-feedback .status-msg{font-size:13px;opacity:.75;margin-bottom:10px;}
  .tab-feedback table{width:100%;border-collapse:collapse;font-size:13px;}
  .tab-feedback th,.tab-feedback td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line,#ddd);vertical-align:top;}
  .tab-feedback th{opacity:.6;font-weight:600;font-size:11px;text-transform:uppercase;}
  .tab-feedback .pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;}
  .tab-feedback .pill.bug{background:#ffdada;color:#a01818;}
  .tab-feedback .pill.idea{background:#fff3c4;color:#8a6d00;}
  .tab-feedback .pill.other{background:#dde6ef;color:#33475e;}
  .tab-feedback .msg-cell{max-width:340px;white-space:pre-wrap;word-break:break-word;}
  .tab-feedback .ctx-cell{max-width:220px;font-size:11px;opacity:.65;word-break:break-word;}
  .tab-feedback .empty{opacity:.6;font-size:13px;padding:20px 0;text-align:center;}
</style>
<div class="tab-feedback">
  <div class="wrap">
    <h1>🐛 Обратная связь от игроков</h1>
    <div class="sub">Читает то, что игроки отправляют через кнопку 🐛 в самой игре (компонент FeedbackWidget.vue → <code>POST pharmacy-game/feedback</code>). Эндпоинт добавлен аддитивно (миграция 115_pharmacy_feedback), пока только на dev2.</div>
    <div class="toolbar">
      <input type="text" id="fbBaseUrl" placeholder="Базовый URL API" />
      <button id="fbLoadBtn">Обновить список</button>
    </div>
    <div class="status-msg" id="fbStatus"></div>
    <div id="fbTableWrap"></div>
  </div>
</div>
  `;

  const LS_KEY = 'ozongame_feedback_tab_base_url';
  const DEFAULT_BASE = 'https://dev2.med-game.ru/api/v1/';
  const input = root.querySelector('#fbBaseUrl');
  const status = root.querySelector('#fbStatus');
  const tableWrap = root.querySelector('#fbTableWrap');
  input.value = localStorage.getItem(LS_KEY) || DEFAULT_BASE;

  const CATEGORY_LABEL = { bug: '🐛 Баг', idea: '💡 Идея', other: '💬 Другое' };

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
  }

  function renderRows(items) {
    if (!items.length) {
      tableWrap.innerHTML = '<div class="empty">Пока пусто — отзывов не поступало.</div>';
      return;
    }
    const rows = items.map((it) => {
      const cat = it.category || 'other';
      const catLabel = CATEGORY_LABEL[cat] || cat;
      let ctxText = '';
      try {
        const ctx = typeof it.context === 'string' ? JSON.parse(it.context) : it.context;
        if (ctx && typeof ctx === 'object') {
          ctxText = Object.entries(ctx).map(([k, v]) => `${k}: ${v}`).join('<br>');
        } else if (it.context) {
          ctxText = escapeHtml(it.context);
        }
      } catch (e) {
        ctxText = escapeHtml(it.context);
      }
      return `
        <tr>
          <td>${it.id ?? ''}</td>
          <td>${it.created_at ? new Date(it.created_at).toLocaleString('ru-RU') : ''}</td>
          <td><span class="pill ${cat}">${catLabel}</span></td>
          <td>${escapeHtml(it.uid)}</td>
          <td>${it.pharmacy_id || '—'}</td>
          <td class="msg-cell">${escapeHtml(it.message)}</td>
          <td class="ctx-cell">${ctxText}</td>
        </tr>`;
    }).join('');
    tableWrap.innerHTML = `
      <table>
        <thead>
          <tr><th>ID</th><th>Когда</th><th>Тип</th><th>UID</th><th>Аптека</th><th>Сообщение</th><th>Контекст</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function load() {
    const base = input.value.trim().replace(/\/?$/, '/');
    localStorage.setItem(LS_KEY, base);
    status.textContent = 'Загружаем…';
    tableWrap.innerHTML = '';
    try {
      const resp = await fetch(base + 'pharmacy-game/feedback');
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const json = await resp.json();
      const items = Array.isArray(json) ? json : (json.data || []);
      status.textContent = `Загружено: ${items.length}`;
      renderRows(items);
    } catch (e) {
      status.textContent = 'Не удалось загрузить: ' + e.message;
    }
  }

  root.querySelector('#fbLoadBtn').addEventListener('click', load);
  load();
}
</script>

    <div class="box blue"><b>dev.html</b><span>vite.dev.config.js · только мы, ?uid=</span></div>
    <div class="arrow">⇄</div>
    <div class="box grey"><b>dev2 / medtest2</b><span>одна и та же реальная БД</span></div>
    <div class="arrow">⇄</div>
    <div class="box green"><b>боевой сайт</b><span>внешний пайплайн · реальные игроки</span></div>
  </div>
  <div class="warn"><b>«dev2» — не отдельная тестовая база.</b> Игроки и наш тест-аккаунт (<code>dev-test-cat27</code>) сидят в ОДНОЙ базе <code>medtest2</code>. Изоляция — только на уровне <code>uid</code> (своя строка) и URL (<code>dev.html</code> — отдельный адрес). Отдельного «dev1»-бэкенда нет и пока не требовался.</div>

  <h2>2. Флаг DEV_CONTENT</h2>
  <p><code>src/constants.js</code> — <code>DEV_CONTENT = import.meta.env.VITE_DEV_CONTENT === 'true'</code>, решается один раз при сборке. Управляет видимостью кота, DEV-кнопок и части клиентских механик. В боевой сборке всегда <code>false</code>.</p>

  <h2>3. Как наши новые мини-игры попадают в задания сервера</h2>
  <p>Сервер ничего не знает про наши 14 мини-игр — в его БД (таблица <code>games</code>) лежат только его собственные game_name (<code>clean</code>, <code>bacteria</code>, <code>tag</code>, <code>pill</code> для аптеки 1; <code>match3</code>, <code>breakout</code>, <code>memory</code>, <code>tag</code> для аптеки 2). Подмена — целиком на клиенте:</p>
  <div class="flow">
    <div class="box blue"><b>Сервер</b><span>отдаёт game_name = "clean"</span></div>
    <div class="arrow">→</div>
    <div class="box grey"><b>TASK_GAME_OVERRIDE</b><span>src/constants/localGames.js</span></div>
    <div class="arrow">→</div>
    <div class="box green"><b>Наша игра</b><span>flappy / sling / frogger / shelf_jump / ...</span></div>
    <div class="arrow">→</div>
    <div class="box blue"><b>Победа</b><span>реверс-поиск → getGameReward(реальный id)</span></div>
  </div>
  <p>Награда всё равно реальная и пишется в БД — клиент находит РЕАЛЬНЫЙ game_id сервера через обратный поиск (<code>reverseLookupServerGameName</code>) и вызывает настоящий <code>getGameReward</code>, просто «как будто» игрок прошёл серверную игру. Подробности и экономика — в скилле <code>ozongame-prod-migration</code>.</p>

  <p>55 таблиц всего — платформа общая (курсы/компании/роли и т.п. для других продуктов), ниже только то, что относится к аптечной игре.</p>

      <div class="erd-table"><div class="name">pharmacy_users</div><div class="cols"><span class="pk">id</span>, uid (login), coins, total_coins, current_pharmacy_id</div></div>
      <div class="erd-table"><div class="name">pharmacies</div><div class="cols"><span class="pk">id</span>, name, description</div></div>

    </div>

  <p class="lead">Все игры/задания/квесты/апгрейды привязаны к <code>pharmacy_id</code> — поэтому аптека 1 и аптека 2 видят РАЗНЫЙ набор (используется для клиентской подмены, см. §3).</p>
