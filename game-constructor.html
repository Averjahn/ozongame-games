<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🧩 Конструктор игры — позы, расстановка, зоны, звук</title>
<!-- Раньше это было ~10 отдельных калибровочных страничек (pharmacy-layout-calibrate,
     pharmacy-zone-calibrate, cat-beg-calibrate, cat-pose-picker, cat-anim-picker,
     cat-packs-lab, cat-anim-sound-sync, cat-guide, ...), каждая со своей копией
     похожего кода (перетаскивание, волна звука, экспорт координат). Теперь это
     один инструмент с вкладками — общий каркас, а всё специфичное для конкретной
     задачи калибровки живёт в своей вкладке. Идея в том, что этот же каркас можно
     переиспользовать и для других похожих проектов (не только для этой игры):
     набор вкладок «позы/паки», «расстановка на сцене», «зоны действия», «анимация
     + звук» покрывает большинство типовых задач calibration-тулинга для 2D-игр
     с покадровыми спрайтами. -->
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#e6edf3; --muted:#93a4b3; --line:rgba(255,255,255,.14); --red:#ff7a72; --green:#3ecf93; --blue:#5fa8ec; --yellow:#FCBE2E; --yellow-d:#f0ad1c; --card:#18232e; --bg:#0d1520; --bg2:#131f2a; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Comfortaa',system-ui,sans-serif;color:var(--ink);background:var(--bg);}
  .shell-header{padding:18px 22px 0;max-width:1260px;margin:0 auto;}
  .shell-header h1{font-size:20px;margin:0 0 10px;}
  .top-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:0 22px 14px;max-width:1260px;margin:0 auto;border-bottom:2px solid var(--line);}
  .top-tabs button{font-family:inherit;font-size:13px;font-weight:700;border:2px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px 10px 0 0;padding:9px 16px;cursor:pointer;border-bottom:none;position:relative;top:2px;}
  .top-tabs button:hover{background:#1e2c3a;}
  .top-tabs button.active{background:var(--blue);border-color:var(--blue);color:#0d1520;}
  #tabRoot{min-height:70vh;}
  /* общие классы-примитивы, которыми пользуются несколько вкладок — вынесены
     сюда один раз вместо того, чтобы каждая вкладка тащила свою копию */
  .note{background:rgba(252,190,46,.12);border:1px solid rgba(252,190,46,.4);border-radius:12px;padding:11px 14px;font-size:12.5px;color:#f3c869;margin-bottom:16px;line-height:1.55;}
  button.act{font-family:inherit;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:8px 14px;cursor:pointer;}
  button.act:hover{background:#1e2c3a;}
  button.act.play{border-color:var(--green);background:var(--green);color:#06231a;}
  button.act.stop{border-color:var(--red);color:var(--red);}
  button.act.copy{border-color:var(--blue);color:var(--blue);}
  button.act.rec{border-color:var(--red);color:var(--red);}
  button.act.rec.recording{background:var(--red);color:#2a0a08;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(255,122,114,.5);}50%{box-shadow:0 0 12px rgba(255,122,114,.7);}}

  /* ── тёмный слой поверх динамически подгружаемых вкладок ──────────────
     Каждая вкладка при переключении инжектит СВОЙ <style> с хардкодед
     светлыми hex прямо внутри #tabRoot (см. renderXTab → root.innerHTML) —
     эти правила физически позже в DOM, поэтому обычная гонка «класс против
     класса» их не перебьёт. #tabRoot — ID, а ID вне конкуренции с любым
     числом классов (специфичность CSS сравнивается по разрядам
     ID → класс → тег), поэтому весь тёмный слой держится на этом префиксе
     и гарантированно выигрывает независимо от порядка вставки в DOM. */
  #tabRoot{background:var(--bg);color:var(--ink);}
  #tabRoot [class^="tab-"]{background:var(--bg) !important;color:var(--ink) !important;}
  #tabRoot code{background:var(--bg2) !important;color:#8fd1ff !important;border-color:var(--line) !important;}
  #tabRoot .note{background:rgba(252,190,46,.12) !important;border-color:rgba(252,190,46,.4) !important;color:#f3c869 !important;}
  #tabRoot .warn{background:rgba(255,122,114,.12) !important;border-color:rgba(255,122,114,.4) !important;color:#ffb3ad !important;}
  #tabRoot .ok{background:rgba(62,207,147,.12) !important;border-color:rgba(62,207,147,.4) !important;color:#8fe9c4 !important;}
  #tabRoot table{color:var(--ink) !important;}
  #tabRoot th{background:var(--bg2) !important;color:var(--muted) !important;border-color:var(--line) !important;}
  #tabRoot td{border-color:var(--line) !important;}
  #tabRoot tr.highlight td{background:rgba(252,190,46,.08) !important;}
  #tabRoot input, #tabRoot select, #tabRoot textarea{background:var(--card) !important;color:var(--ink) !important;border-color:var(--line) !important;}
  #tabRoot .erd-group, #tabRoot .erd-table, #tabRoot .bowl-card, #tabRoot .flow .box, #tabRoot .rel-box{background:var(--card) !important;border-color:var(--line) !important;}
  #tabRoot .erd-table .name, #tabRoot .rel-box.grey{background:var(--bg2) !important;}
</style>
</head>
<body>
<div class="shell-header">
  <h1>🧩 Конструктор игры</h1>
</div>
<div class="top-tabs" id="topTabs"></div>
<div id="tabRoot"></div>

<script>
/* ============================================================
   Каркас: реестр вкладок + переключение. Каждая вкладка — функция
   renderXxxTab(root), которая полностью перестраивает #tabRoot при
   каждом заходе (без сохранения состояния между переключениями —
   так проще и надёжнее, чем городить show/hide для десятка вкладок
   с независимыми таймерами/аудио-контекстами/RAF-циклами).
   ============================================================ */
const TOP_TABS = [
  { key: 'poses', label: '🐾 Позы и паки', render: (root) => renderPosesTab(root) },
  { key: 'layout', label: '📐 Расстановка', render: (root) => renderLayoutTab(root) },
  { key: 'zones', label: '🧭 Зоны прыжка', render: (root) => renderZonesTab(root) },
  { key: 'floorbed', label: '🛏️ Пол и лежанка', render: (root) => renderFloorBedTab(root) },
  { key: 'shelfitems', label: '🛒 Полки-товары', render: (root) => renderShelfItemsTab(root) },
  { key: 'mobileshelf', label: '📱 Мобильные полки', render: (root) => renderMobileShelfTab(root) },
  { key: 'mobilescene', label: '📱 Мобильная сцена', render: (root) => renderMobileSceneTab(root) },
  { key: 'taskgames', label: '🎮 Игры в заданиях', render: (root) => renderTaskGamesTab(root) },
  { key: 'begdx', label: '🎯 Смещение у миски', render: (root) => renderBegDxTab(root) },
  { key: 'studio', label: '🎛️ Анимация + звук', render: (root) => renderStudioTab(root) },
  { key: 'guide', label: '📖 Гайд', render: (root) => renderGuideTab(root) },
  { key: 'status', label: '📊 Статус проекта', render: (root) => renderStatusTab(root) },
  { key: 'feedback', label: '🐛 Обратная связь', render: (root) => renderFeedbackTab(root) },
  { key: 'qareport', label: '🧪 Отчёт QA-отдела', render: (root) => renderQaReportTab(root) },
  { key: 'balance', label: '⚖️ Баланс экономики', render: (root) => renderBalanceTab(root) },
  { key: 'backend', label: '🗄️ Архитектура бэкенда', render: (root) => renderBackendArchTab(root) },
];

const topTabsEl = document.getElementById('topTabs');
const tabRootEl = document.getElementById('tabRoot');
let activeTopKey = TOP_TABS[0].key;

TOP_TABS.forEach((t) => {
  const btn = document.createElement('button');
  btn.textContent = t.label;
  btn.dataset.key = t.key;
  btn.className = t.key === activeTopKey ? 'active' : '';
  btn.onclick = () => { activeTopKey = t.key; renderTopTabs(); mountActive(); };
  topTabsEl.appendChild(btn);
});
function renderTopTabs() { [...topTabsEl.children].forEach((b) => b.classList.toggle('active', b.dataset.key === activeTopKey)); }
function mountActive() {
  tabRootEl.innerHTML = '';
  tabRootEl.className = ''; // сброс scoping-класса (tab-guide/tab-layout/...), иначе он копится между переключениями и стили одной вкладки просачиваются в другую
  const t = TOP_TABS.find((x) => x.key === activeTopKey);
  t.render(tabRootEl);
}
</script>

26},{"row":55,"frames":2,"w":51,"h":26},{"row":56,"frames":10,"w":23,"h":43},{"row":57,"frames":8,"w":23,"h":37},{"row":58,"frames":10,"w":40,"h":32},{"row":59,"frames":10,"w":40,"h":32},{"row":60,"frames":3,"w":46,"h":33},{"row":61,"frames":2,"w":46,"h":32},{"row":62,"frames":3,"w":23,"h":46},{"row":63,"frames":5,"w":48,"h":39},{"row":64,"frames":5,"w":48,"h":39},{"row":65,"frames":4,"w":28,"h":37}];

  // real localStorage key, kept from public/cat-pose-picker.html (the source tool whose
  // row numbers actually match the shipped CatsLayer.vue POSE_ROW/BEG_ROW/EAT_ROW).
  const STORAGE_KEY = 'ozongame_pose_picker_v2';

  function defaultState() {
    const s = {}; SLOT_KEYS.forEach((k) => (s[k] = DEFAULT_ROW[k])); return s;
  }
  function load() {
    const base = defaultState();
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        SLOT_KEYS.forEach((k) => { if (typeof saved[k] === 'number') base[k] = saved[k]; });
      }
    } catch {}
    return base;
  }
  let state = load();
  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {} }

  let armed = null;
  let curColor = BREEDS[0].color;

  const packSelectEl = root.querySelector('#pose-pack-select');
  const breedSelectEl = root.querySelector('#pose-breed-select');
  const slotsEl = root.querySelector('#pose-slots');
  const lieRowEl = root.querySelector('#pose-lie-row');
  const catalogEl = root.querySelector('#pose-catalog');
  const outEl = root.querySelector('#pose-out');
  const statEl = root.querySelector('#pose-stat');
  const modalBg = root.querySelector('#pose-modal-bg');
  const modalImg = root.querySelector('#pose-modal-img');
  const modalLabel = root.querySelector('#pose-modal-label');

  function openModal(src, label) {
    modalImg.src = src;
    modalLabel.textContent = label;
    modalBg.classList.add('pose-open');
  }
  function closeModal() { modalBg.classList.remove('pose-open'); }
  modalBg.addEventListener('click', (e) => { if (e.target === modalBg) closeModal(); });
  root.querySelector('#pose-modal-close').addEventListener('click', closeModal);

  function renderPackSelect() {
    packSelectEl.innerHTML = PACKS.map((p) => `<option value="${p.key}">${p.name}</option>`).join('');
  }
  function renderBreedSelect() {
    breedSelectEl.innerHTML = BREEDS.map((b) => `<option value="${b.key}">${b.name}</option>`).join('');
  }

  function renderSlots() {
    slotsEl.innerHTML = '';
    SLOT_KEYS.forEach((key) => {
      const curRow = state[key];
      const div = document.createElement('div');
      div.className = 'pose-slot' + (armed === key ? ' pose-armed' : '');
      div.innerHTML = `
        <img src="${rowSrc(curColor, curRow)}" alt="${SLOT_LABELS[key]}">
        <b>${SLOT_LABELS[key]}</b>
        <small>row-${String(curRow).padStart(2, '0')}</small>
      `;
      div.querySelector('img').addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(rowSrc(curColor, curRow), SLOT_LABELS[key] + ' · row-' + curRow);
      });
      div.addEventListener('click', () => {
        armed = armed === key ? null : key;
        renderSlots(); renderCatalog();
      });
      slotsEl.appendChild(div);
    });
  }

  function renderLieRow() {
    lieRowEl.innerHTML = '';
    for (let i = 0; i < LIE_COUNT; i++) {
      const div = document.createElement('div');
      div.className = 'pose-slot';
      div.innerHTML = `<img src="${lieSrc(curColor, i)}" alt="${LIE_LABELS[i]}"><b>${LIE_LABELS[i]}</b>`;
      div.addEventListener('click', () => openModal(lieSrc(curColor, i), LIE_LABELS[i]));
      lieRowEl.appendChild(div);
    }
  }

  function usedByRow(rowNum) {
    return SLOT_KEYS.filter((k) => state[k] === rowNum).map((k) => SLOT_LABELS[k]);
  }

  function renderCatalog() {
    catalogEl.classList.toggle('pose-disabled', !armed);
    catalogEl.innerHTML = '';
    ROWS_META.forEach((r) => {
      const used = usedByRow(r.row);
      const div = document.createElement('div');
      div.className = 'pose-cat-item';
      div.innerHTML = `
        ${used.length ? `<div class="pose-used">${used[0]}${used.length > 1 ? ' +' + (used.length - 1) : ''}</div>` : ''}
        <img src="${rowSrc(curColor, r.row)}" alt="row ${r.row}">
        <div class="pose-rn">#${r.row}</div>
        <div class="pose-meta">${r.frames} кадр · ${r.w}×${r.h}</div>
      `;
      div.querySelector('img').addEventListener('click', (e) => {
        e.stopPropagation();
        openModal(rowSrc(curColor, r.row), 'row-' + r.row + (used.length ? ' (' + used.join(', ') + ')' : ''));
      });
      div.addEventListener('click', () => {
        if (!armed) return;
        state[armed] = r.row;
        save();
        renderSlots(); renderCatalog(); renderOut();
      });
      catalogEl.appendChild(div);
    });
  }

  function renderOut() {
    outEl.textContent = JSON.stringify(state, null, 2);
    const changed = SLOT_KEYS.filter((k) => state[k] !== DEFAULT_ROW[k]).length;
    statEl.textContent = changed ? `изменено полей: ${changed}` : 'без изменений от текущих значений игры';
  }

  function renderAll() {
    renderSlots(); renderLieRow(); renderCatalog(); renderOut();
  }

  renderPackSelect();
  renderBreedSelect();
  packSelectEl.value = PACKS[0].key;
  breedSelectEl.value = curColor === 'black' ? 'dark' : curColor === 'ginger' ? 'ginger' : 'gray';

  breedSelectEl.addEventListener('change', () => {
    const b = BREEDS.find((x) => x.key === breedSelectEl.value) || BREEDS[0];
    curColor = b.color;
    renderAll();
  });

  root.querySelector('#pose-reset-btn').addEventListener('click', () => {
    state = defaultState(); armed = null; save();
    renderAll();
  });
  root.querySelector('#pose-copy-btn').addEventListener('click', async () => {
    const text = JSON.stringify(state, null, 2);
    try { await navigator.clipboard.writeText(text); alert('Скопировано! Отправьте этот JSON в чат.'); }
    catch { alert('Не удалось скопировать — выделите текст ниже вручную.'); }
  });

  renderAll();
}

</script>

</style>
<div class="wrap">
  <h1>📐 Калибровка расположения: полки + фармацевт</h1>
  <p class="lead">Фон показан ровно в том обрезе, что видит игрок (то же окно 1200×810, что и в игре — области под меню/панелью улучшений уже вырезаны по бокам). Перетаскивайте товары, фармацевта и монитор мышью прямо по картинке — координаты внизу обновляются в реальном времени и уже в той системе, что использует код игры.</p>
  <div class="note">💡 Оранжевая штриховка слева и красная справа — это места, где ВСЕГДА поверх фона лежит панель меню/улучшений (непрозрачная) — старайтесь не ставить товары туда, игрок их не увидит. Синяя пунктирная линия — уровень пола. Над каждым товаром — кнопка «📦 коробка (стоя)» / «🧴 круглое (набок)»: кликните, чтобы переключить, как этот товар будет лежать на полу, когда кот его собьёт — коробки (плоские грани) остаются стоять как стояли, всё круглое в сечении (бутылки/тюбики/капельницы) ложится набок. Когда закончите — «📋 Скопировать код» и пришлите мне текст.</div>

  <div class="tabs">

  <div class="stage-wrap" id="lay-stage" style="width:900px;max-width:100%;">
    <img class="bg" id="lay-bgImg" src="layout-calibrate-assets/roomAI1_content.jpg" alt="фон" />

  <div class="panel">
    <h3>📍 Текущие координаты (система игры: x/y в .pharmacy-content)</h3>
    <table>
      <thead><tr><th>Элемент</th><th>x</th><th>y</th><th>примечание</th></tr></thead>
      <tbody id="lay-coordsBody"></tbody>
    </table>
    <div class="btnrow">
      <button class="act reset" id="lay-resetBtn">🔄 Сбросить к текущим в игре</button>

    <textarea id="lay-codeOut" readonly placeholder="Нажмите «Скопировать код» — здесь появится текст для отправки"></textarea>

`;

  const SCALE_W = 900; // ширина стейджа на экране; реальная система координат — 1200×810
  const NATIVE_W = 1200, NATIVE_H = 810;
  const scale = SCALE_W / NATIVE_W;

  // стартовые позиции = ТЕКУЩИЕ значения из CatsLayer.vue / PharmacyView.vue
  // (обновлены после первой калибровки заказчиком — см. историю коммитов)
  const DEFAULTS = {
    1: {
      shelf: [
        { id: 'p1-l1', img: 'products1_item0.png', x: 350, y: 508, box: false },
        { id: 'p1-l2', img: 'products1_item1.png', x: 357, y: 584, box: true },
        { id: 'p1-l3', img: 'products1_item2.png', x: 877, y: 505, box: false },
        { id: 'p1-r1', img: 'products1_item3.png', x: 883, y: 582, box: false },
      ],

        { id: 'p2-2', img: 'products2_item1.png', x: 468, y: 513, box: true },
        { id: 'p2-3', img: 'products2_item2.png', x: 363, y: 440, box: false },
        { id: 'p2-4', img: 'products2_item3.png', x: 468, y: 440, box: false },
      ],
      pharmacist: { x: 525, y: 42 },
      monitor: { x: 715, y: 285 },
    },
  };
  const SHELF_ITEM_H = 54, PHARMACIST_H = 378, MONITOR_H = 150;
  const MENU_ZONE = { x0: 26, x1: 316 };      // 386-676 в системе фона минус 360
  const UPGRADES_ZONE = { x0: 928, x1: 1200 }; // 1288-1560 в системе фона минус 360
  const FLOOR_Y = 750;

  const STORE_KEY = 'ozongame_layout_calib_v1';
  let state = null;
  try { state = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
  if (!state) state = JSON.parse(JSON.stringify(DEFAULTS));

  let current = 1;
  const stage = root.querySelector('#lay-stage');
  const bgImg = root.querySelector('#lay-bgImg');
  stage.style.height = (SCALE_W * NATIVE_H / NATIVE_W) + 'px';

  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {} }

  function clearOverlays() {
    stage.querySelectorAll('.drag, .zone, .floorline').forEach((el) => el.remove());
  }

  function makeZone(cls, x0, x1, y0, y1, label) {
    const el = document.createElement('div');
    el.className = 'zone ' + cls;
    el.style.left = (x0 * scale) + 'px';
    el.style.top = (y0 * scale) + 'px';
    el.style.width = ((x1 - x0) * scale) + 'px';
    el.style.height = ((y1 - y0) * scale) + 'px';
    el.textContent = label;
    stage.appendChild(el);
  }

  function makeFloorLine() {
    const el = document.createElement('div');
    el.className = 'floorline';
    el.style.top = (FLOOR_Y * scale) + 'px';
    const span = document.createElement('span');
    span.textContent = 'пол y=' + FLOOR_Y;
    el.appendChild(span);
    stage.appendChild(el);
  }

  function makeDraggable(opts) {
    // opts: {x,y (getter/setter target obj+key), img, height, anchor: 'top-left'|'bottom-center', label, onMove, boxToggle?:{get,set}}
    const el = document.createElement('div');
    el.className = 'drag' + (opts.anchor === 'bottom-center' ? ' shelf' : '');
    const im = document.createElement('img');
    im.src = opts.img;
    el.appendChild(im);
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = opts.label;
    el.appendChild(tag);
    if (opts.boxToggle) {
      const btn = document.createElement('div');
      function renderBtn() {
        const isBox = opts.boxToggle.get();
        btn.className = 'boxtoggle' + (isBox ? ' on' : '');
        btn.textContent = isBox ? '📦 коробка (стоя)' : '🧴 круглое (набок)';
      }
      renderBtn();
      btn.addEventListener('pointerdown', (e) => e.stopPropagation()); // не начинать перетаскивание
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        opts.boxToggle.set(!opts.boxToggle.get());
        renderBtn();
        save();
      });
      el.appendChild(btn);
    }
    stage.appendChild(el);

    function render() {
      const h = opts.height * scale;
      im.style.height = h + 'px';
      im.style.width = 'auto';
      el.style.height = h + 'px';
      if (opts.anchor === 'bottom-center') {
        el.style.left = (opts.get().x * scale) + 'px';
        el.style.top = ((opts.get().y - opts.height) * scale) + 'px';
        el.style.transform = 'translateX(-50%)';
        el.style.width = 'auto';
      } else {
        el.style.left = (opts.get().x * scale) + 'px';
        el.style.top = (opts.get().y * scale) + 'px';
        el.style.transform = 'none';
      }
    }
    render();

    let dragging = false, startPX = 0, startPY = 0, startX = 0, startY = 0;
    el.addEventListener('pointerdown', (e) => {
      dragging = true; el.setPointerCapture(e.pointerId);
      startPX = e.clientX; startPY = e.clientY;
      const p = opts.get(); startX = p.x; startY = p.y;
    });
    el.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = (e.clientX - startPX) / scale;
      const dy = (e.clientY - startPY) / scale;
      const nx = Math.max(0, Math.min(NATIVE_W, Math.round(startX + dx)));
      const ny = Math.max(0, Math.min(NATIVE_H, Math.round(startY + dy)));
      opts.set(nx, ny);
      render();
      updateReadout();
      save();
    });
    el.addEventListener('pointerup', () => { dragging = false; });
    el.addEventListener('pointerleave', () => { if (!dragging) return; });
    return { render };
  }

  function buildStage() {
    clearOverlays();
    bgImg.src = `layout-calibrate-assets/roomAI${current}_content.jpg`;
    makeZone('menu', MENU_ZONE.x0, MENU_ZONE.x1, 0, NATIVE_H, 'меню (перекрывает)');
    makeZone('upgrades', UPGRADES_ZONE.x0, UPGRADES_ZONE.x1, 0, NATIVE_H, 'улучшения (перекрывает)');
    makeFloorLine();

    const s = state[current];
    s.shelf.forEach((item, i) => {
      makeDraggable({
        img: `layout-calibrate-assets/${item.img}`,
        height: SHELF_ITEM_H,
        anchor: 'bottom-center',
        label: item.id,
        get: () => ({ x: item.x, y: item.y }),
        set: (x, y) => { item.x = x; item.y = y; },
        boxToggle: { get: () => !!item.box, set: (v) => { item.box = v; } },
      });
    });
    makeDraggable({
      img: 'layout-calibrate-assets/pharmacist.svg',
      height: PHARMACIST_H,
      anchor: 'top-left',
      label: 'фармацевт',
      get: () => ({ x: s.pharmacist.x, y: s.pharmacist.y }),
      set: (x, y) => { s.pharmacist.x = x; s.pharmacist.y = y; },
    });
    makeDraggable({
      img: 'layout-calibrate-assets/monitor.svg',
      height: MONITOR_H,
      anchor: 'top-left',
      label: 'монитор',
      get: () => ({ x: s.monitor.x, y: s.monitor.y }),
      set: (x, y) => { s.monitor.x = x; s.monitor.y = y; },
    });
    updateReadout();
  }

  function updateReadout() {
    const s = state[current];
    const tbody = root.querySelector('#lay-coordsBody');
    let rows = '';
    s.shelf.forEach((item) => {
      rows += `<tr><td>${item.id}</td><td>${item.x}</td><td>${item.y}</td><td>${item.box ? '📦 при падении стоит' : '🧴 при падении набок'}</td></tr>`;
    });
    rows += `<tr><td>фармацевт</td><td>${s.pharmacist.x}</td><td>${s.pharmacist.y}</td><td>верх-лево, высота ${PHARMACIST_H}px</td></tr>`;
    rows += `<tr><td>монитор</td><td>${s.monitor.x}</td><td>${s.monitor.y}</td><td>верх-лево, высота ${MONITOR_H}px</td></tr>`;
    tbody.innerHTML = rows;
  }

  root.querySelector('#lay-tab1').onclick = () => { current = 1; root.querySelector('#lay-tab1').classList.add('active'); root.querySelector('#lay-tab2').classList.remove('active'); buildStage(); };
  root.querySelector('#lay-tab2').onclick = () => { current = 2; root.querySelector('#lay-tab2').classList.add('active'); root.querySelector('#lay-tab1').classList.remove('active'); buildStage(); };

  root.querySelector('#lay-resetBtn').onclick = () => {
    state[current] = JSON.parse(JSON.stringify(DEFAULTS[current]));
    save();
    buildStage();
  };

  root.querySelector('#lay-copyBtn').onclick = () => {
    let out = '';
    for (const n of [1, 2]) {
      const s = state[n];
      out += `// ── Аптека ${n} ──\n`;
      out += `shelf: [\n`;
      s.shelf.forEach((item) => { out += `  { id: '${item.id}', x: ${item.x}, y: ${item.y}, box: ${!!item.box} },\n`; });
      out += `],\n`;
      out += `pharmacist: { left: ${s.pharmacist.x}px, top: ${s.pharmacist.y}px },\n`;
      out += `monitor: { left: ${s.monitor.x}px, top: ${s.monitor.y}px },\n\n`;
    }
    const el = root.querySelector('#lay-codeOut');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
}

<script>

  // откалиброванные заказчиком позиции фармацевта/монитора (pharmacy-layout-calibrate.html) —
  // показаны здесь ТОЛЬКО как визуальный ориентир (полупрозрачные, некликабельные)
  const AI_PHARMACIST_POS = { 1: { x: 438, y: 78 }, 2: { x: 525, y: 42 } };

    if (bgDef.ai) {
      return { pharmacist: AI_PHARMACIST_POS[bgDef.pharmacyNumber], monitor: AI_MONITOR_POS[bgDef.pharmacyNumber] };
    }
    return { pharmacist: DEFAULT_PHARMACIST_POS, monitor: DEFAULT_MONITOR_POS };
  }

  // стартовые значения = ТЕКУЩИЕ хардкод-фолбэки из CatsLayer.vue (COUNTER/WINDOW_ZONE) —
  // они сейчас ОДНИ НА ВСЕ фоны (не привязаны к конкретному бэкграунду), поэтому у всех
  // одинаковый дефолт на старте — калибровка нужна именно чтобы развести их по фонам
  function defaultZones() {
    return {
      counter: { minX: 900, maxX: 1150, y: 528 },

  }

  root.innerHTML = `

  .tab-zones .refimg .tag{position:absolute;left:0;top:100%;font-size:9.5px;font-weight:700;background:rgba(39,56,74,.85);color:#fff;padding:1px 5px;border-radius:5px;white-space:nowrap;}

  .tab-zones .zonebox.counter{border-color:var(--blue);background:rgba(79,147,214,.18);}

  .tab-zones .zonebox .label{position:absolute;left:4px;top:-20px;font-size:10.5px;font-weight:700;background:#27384a;color:#fff;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .tab-zones .handle{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--card);border:2px solid #27384a;top:50%;transform:translate(-50%,-50%);cursor:ew-resize;z-index:5;}
  .tab-zones .handle.left{left:0;}
  .tab-zones .handle.right{left:100%;}
  .tab-zones .handle.ybar{left:50%;top:0;transform:translate(-50%,-50%);cursor:ns-resize;width:22px;height:13px;border-radius:6px;}
  .tab-zones .floorline{position:absolute;left:0;right:0;height:0;border-top:3px dashed var(--yellow);cursor:ns-resize;}
  .tab-zones .floorline .fltag{position:absolute;left:6px;top:-22px;font-size:10.5px;font-weight:700;background:#27384a;color:#fff;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .tab-zones .floorline .flhandle{position:absolute;left:50%;top:0;transform:translate(-50%,-50%);width:26px;height:14px;border-radius:7px;background:var(--yellow);border:2px solid #f0ad1c;}
  .tab-zones .panel{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:14px;margin-top:16px;}
  .tab-zones .panel h3{margin:0 0 8px;font-size:14px;}
  .tab-zones table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:10px;}
  .tab-zones td,.tab-zones th{padding:4px 6px;text-align:left;border-bottom:1px solid var(--line);}
  .tab-zones th{color:var(--muted);font-weight:700;font-size:11px;}
  .tab-zones .btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .tab-zones button.act{font-family:inherit;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:8px;padding:8px 14px;cursor:pointer;}
  .tab-zones button.act.copy{border-color:var(--green);color:#3ecf93;}
  .tab-zones button.act.reset{border-color:var(--red);color:var(--red);}
  .tab-zones textarea{width:100%;min-height:200px;font-family:'SF Mono',Menlo,monospace;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px;color:var(--ink);background:var(--bg2);}
</style>
<div class="tab-zones">
<div class="wrap">
  <h1>📐 Калибровка зон, куда кот может запрыгивать</h1>
  <p class="lead">Синяя зона — «стол/прилавок» (кот иногда запрыгивает туда), зелёная — «окно» (кот иногда сидит на подоконнике). Тащите ВЕСЬ прямоугольник, чтобы подвинуть; круглые точки по бокам — сузить/расширить; овальная точка сверху — поднять/опустить высоту поверхности (нижний край прямоугольника = высота, на которую реально встаёт кот). Жёлтая пунктирная линия — уровень пола (где стоят коты и миски по умолчанию) — тащите её вверх/вниз. Полупрозрачные силуэты фармацевта и монитора — те же откалиброванные позиции, что вы выставили в другом инструменте, для ориентира (их тут двигать не нужно).</p>
  <div class="note">💡 Картинка теперь занимает всю ширину до 1200px — это её РЕАЛЬНЫЙ размер в игре (раньше показывалась уменьшенной и с багом при узком окне). Показан ровно тот обрез сцены, что видит игрок. Для фонов «Оригинал 1/2» и «ИИ-Аптека 1/2» зоны, скорее всего, не откалиброваны — «День»/«Вечер» уже были настроены раньше. Когда закончите — «📋 Скопировать код» и пришлите текст.</div>

  <div class="tabs" id="zone-tabs"></div>

  <div class="stage-outer" id="zone-stageOuter"></div>

  <div class="panel">
    <h3>📍 Текущие зоны (система игры: minX/maxX/y в .pharmacy-content)</h3>
    <table>
      <thead><tr><th>Зона</th><th>minX</th><th>maxX</th><th>y (высота поверхности)</th></tr></thead>
      <tbody id="zone-coordsBody"></tbody>
    </table>
    <div class="btnrow">
      <button class="act reset" id="zone-resetBtn">🔄 Сбросить к дефолту этого фона</button>
      <button class="act copy" id="zone-copyBtn">📋 Скопировать код</button>
    </div>
    <textarea id="zone-codeOut" readonly placeholder="Нажмите «Скопировать код» — здесь появится текст для отправки"></textarea>
  </div>
</div>
</div>
`;

  const STORE_KEY = 'ozongame_zone_calib_v1';
  let state = null;
  try { state = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
  if (!state) state = {};
  BACKGROUNDS.forEach((b) => {
    if (!state[b.key]) state[b.key] = defaultZones();
    if (state[b.key].floorY == null) state[b.key].floorY = 750; // миграция старых сохранений без пола
  });

  let current = BACKGROUNDS[0].key;
  const tabsEl = root.querySelector('#zone-tabs');
  const stageOuter = root.querySelector('#zone-stageOuter');

  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch (e) {} }
  // масштаб считаем от РЕАЛЬНОГО текущего размера контейнера на экране (не от
  // константы) — контейнер резиновый (width:100%; max-width:1200px), поэтому
  // на разных окнах/мониторах пересчитывается сам, никогда не расходится с картинкой
  function getScale() { return stageOuter.getBoundingClientRect().width / CONTENT_W; }

  BACKGROUNDS.forEach((b) => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = b.key === current ? 'active' : '';
    btn.onclick = () => { current = b.key; renderTabs(); buildStage(); };
    btn.dataset.key = b.key;
    tabsEl.appendChild(btn);
  });
  function renderTabs() {
    [...tabsEl.children].forEach((btn) => btn.classList.toggle('active', btn.dataset.key === current));
  }

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function buildStage() {
    stageOuter.innerHTML = '';
    const bgDef = BACKGROUNDS.find((b) => b.key === current);
    const img = document.createElement('img');
    img.className = 'bg';
    img.src = `zone-calibrate-assets/${bgDef.file}`;
    stageOuter.appendChild(img);

    // силуэты фармацевта/монитора — просто ориентир, не интерактивны
    const ref = refPositionsFor(bgDef);
    addRefImg('layout-calibrate-assets/pharmacist.svg', ref.pharmacist, PHARMACIST_H, 'фармацевт (ориентир)');
    addRefImg('layout-calibrate-assets/monitor.svg', ref.monitor, MONITOR_H, 'монитор (ориентир)');

    const zones = state[current];
    makeZoneBox('counter', 'Стол/прилавок', zones.counter);
    makeZoneBox('window', 'Окно', zones.window);
    makeFloorLine(zones);
    updateReadout();
  }

  function makeFloorLine(zones) {
    const el = document.createElement('div');
    el.className = 'floorline';
    const tag = document.createElement('div'); tag.className = 'fltag'; tag.textContent = 'пол';
    const handle = document.createElement('div'); handle.className = 'flhandle';
    el.appendChild(tag); el.appendChild(handle);
    stageOuter.appendChild(el);

    function render() {
      const scale = getScale();
      el.style.top = (zones.floorY * scale) + 'px';
      tag.textContent = 'пол y=' + zones.floorY;
    }
    render();

    let dragging = false, startPY = 0, startFloorY = 0, dragScale = 1;
    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      dragging = true; startPY = e.clientY; startFloorY = zones.floorY; dragScale = getScale();
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dy = (e.clientY - startPY) / dragScale;
      zones.floorY = clamp(Math.round(startFloorY + dy), 100, 810);
      render(); updateReadout(); save();
    });
    el.addEventListener('pointerup', () => { dragging = false; });
  }

  function addRefImg(src, pos, heightNative, tagText) {
    const scale = getScale();
    const wrap = document.createElement('div');
    wrap.className = 'refimg';
    wrap.style.left = (pos.x * scale) + 'px';
    wrap.style.top = (pos.y * scale) + 'px';
    wrap.style.height = (heightNative * scale) + 'px';
    const im = document.createElement('img');
    im.src = src;
    im.style.height = '100%';
    im.style.display = 'block';
    wrap.appendChild(im);
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.textContent = tagText;
    wrap.appendChild(tag);
    stageOuter.appendChild(wrap);
  }

  function makeZoneBox(kind, label, z) {
    const box = document.createElement('div');
    box.className = 'zonebox ' + kind;
    const lab = document.createElement('div'); lab.className = 'label'; lab.textContent = label;
    box.appendChild(lab);
    const hL = document.createElement('div'); hL.className = 'handle left';
    const hR = document.createElement('div'); hR.className = 'handle right';
    const hY = document.createElement('div'); hY.className = 'handle ybar';
    box.appendChild(hL); box.appendChild(hR); box.appendChild(hY);
    stageOuter.appendChild(box);

    function render() {
      const scale = getScale();
      box.style.left = (z.minX * scale) + 'px';
      box.style.width = ((z.maxX - z.minX) * scale) + 'px';
      box.style.top = ((z.y - BOX_H) * scale) + 'px';
      box.style.height = (BOX_H * scale) + 'px';
    }
    render();

    let mode = null, startPX = 0, startPY = 0, startMinX = 0, startMaxX = 0, startY = 0, dragScale = 1;
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      startMinX = z.minX; startMaxX = z.maxX; startY = z.y;
      dragScale = getScale();
      box.setPointerCapture(e.pointerId);
    }
    box.addEventListener('pointerdown', (e) => down(e, 'move'));
    hL.addEventListener('pointerdown', (e) => down(e, 'left'));
    hR.addEventListener('pointerdown', (e) => down(e, 'right'));
    hY.addEventListener('pointerdown', (e) => down(e, 'y'));
    box.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const dx = (e.clientX - startPX) / dragScale;
      const dy = (e.clientY - startPY) / dragScale;
      if (mode === 'move') {
        const w = startMaxX - startMinX;
        z.minX = clamp(Math.round(startMinX + dx), 0, CONTENT_W - w);
        z.maxX = z.minX + w;
        z.y = clamp(Math.round(startY + dy), BOX_H, 810);
      } else if (mode === 'left') {
        z.minX = clamp(Math.round(startMinX + dx), 0, z.maxX - 20);
      } else if (mode === 'right') {
        z.maxX = clamp(Math.round(startMaxX + dx), z.minX + 20, CONTENT_W);
      } else if (mode === 'y') {
        z.y = clamp(Math.round(startY + dy), BOX_H, 810);
      }
      render(); updateReadout(); save();
    });
    box.addEventListener('pointerup', () => { mode = null; });
  }

  function updateReadout() {
    const zones = state[current];
    const tbody = root.querySelector('#zone-coordsBody');
    tbody.innerHTML = `
      <tr><td>Стол/прилавок</td><td>${zones.counter.minX}</td><td>${zones.counter.maxX}</td><td>${zones.counter.y}</td></tr>
      <tr><td>Окно</td><td>${zones.window.minX}</td><td>${zones.window.maxX}</td><td>${zones.window.y}</td></tr>
      <tr><td>Пол</td><td>—</td><td>—</td><td>${zones.floorY}</td></tr>
    `;
  }

  root.querySelector('#zone-resetBtn').onclick = () => {
    state[current] = defaultZones();
    save();
    buildStage();
  };

  root.querySelector('#zone-copyBtn').onclick = () => {
    let out = '';
    BACKGROUNDS.forEach((b) => {
      const z = state[b.key];
      out += `// ${b.label} (${b.key})\n`;
      out += `counter: { minX: ${z.counter.minX}, maxX: ${z.counter.maxX}, y: ${z.counter.y} },\n`;
      out += `window:  { minX: ${z.window.minX}, maxX: ${z.window.maxX}, y: ${z.window.y} },\n`;
      out += `floorY:  ${z.floorY},\n\n`;
    });
    const el = root.querySelector('#zone-codeOut');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
  if (window.__zoneResizeHandler) window.removeEventListener('resize', window.__zoneResizeHandler);
  window.__zoneResizeHandler = () => buildStage();
  window.addEventListener('resize', window.__zoneResizeHandler);
}

</script>
<script>
function renderFloorBedTab(root) {
  const CONTENT_W = 1200;

  const BACKGROUNDS = [
    { key: 'ai1', label: 'ИИ-Аптека 1', file: 'roomAI1.jpg' },
    { key: 'ai2', label: 'ИИ-Аптека 2', file: 'roomAI2.jpg' },
    { key: 'day', label: 'День', file: 'roomDay.svg' },
    { key: 'evening', label: 'Вечер', file: 'roomEvening.svg' },
    { key: 'orig1', label: 'Оригинал 1', file: 'pharmacyBackground1.png' },

  // текущий фолбэк из игры (CatsLayer.vue: fieldPoint — Y зажат в [FLOOR_Y-150, FLOOR_Y-10],
  // X — в floorMinX/floorMaxX) — один и тот же диапазон на ВСЕ фоны, поэтому лежанку и
  // можно поставить туда, где на картинке на самом деле стена/полка. Калибровка нужна,

  const LIE_POSES = [0, 1, 2, 3]; // lie-0..lie-3.png (см. CatsLayer.vue: LIE_COUNT)

  root.innerHTML = `
<style>

  .tab-floorbed .fh.left{left:-7px;} .tab-floorbed .fh.right{right:-7px;}

  .tab-floorbed .panel h3{margin:0 0 8px;font-size:14px;}

  .tab-floorbed button.act.copy{border-color:var(--green);color:#3ecf93;}
  .tab-floorbed button.act.reset{border-color:var(--red);color:var(--red);}
  .tab-floorbed .bed-stage{position:relative;width:100%;max-width:420px;height:300px;border-radius:14px;overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(180deg,#eaf3fb 0%,#eaf3fb 72%, #cdb98a 72%, #b89e6e 100%);}
  .tab-floorbed .bed-img{position:absolute;transform:translateX(-50%);bottom:60px;pointer-events:none;}
  .tab-floorbed .bed-resize{position:absolute;width:20px;height:20px;border-radius:50%;background:var(--card);border:2px solid var(--yellow-d);cursor:ns-resize;transform:translate(-50%,50%);}
  .tab-floorbed .bed-cat{position:absolute;image-rendering:pixelated;transform:translateX(-50%);cursor:grab;filter:drop-shadow(0 3px 5px rgba(0,0,0,.3));}

  .tab-floorbed .bed-cat-mark{position:absolute;width:16px;height:2px;background:#e8635f;transform:translate(-50%,-1px);}

  .tab-floorbed .lie-poses button{font-family:inherit;font-size:12.5px;font-weight:700;border:2px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:9px;padding:7px 13px;cursor:pointer;}
  .tab-floorbed .lie-poses button.active{border-color:var(--blue);background:rgba(79,147,214,.1);color:var(--blue);}
  .tab-floorbed textarea{width:100%;min-height:160px;font-family:'SF Mono',Menlo,monospace;font-size:11.5px;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px;color:var(--ink);background:var(--bg2);}
</style>
<div class="tab-floorbed">
<div class="wrap">
  <h1>🛏️ Пол и лежанка</h1>
  <p class="lead">Здесь два инструмента: где на картинке аптеки реально пол (чтобы лежанку/когтеточку/миски нельзя было поставить «на стену»), и как именно кот укладывается в лежанку (чтобы не сидел криво).</p>
  <div class="note">💡 Когда закончите разметку в обоих блоках — «📋 Скопировать код» внизу и пришлите мне текст, я применю значения в игре.</div>

  <h2>1. Где на этой картинке пол</h2>
  <p class="lead">Жёлтый прямоугольник — зона, где можно ставить лежанку/когтеточку/миски. Тащите за края — сузить/расширить, тащите весь прямоугольник — подвинуть. Подгоните так, чтобы прямоугольник закрывал именно видимый пол на картинке, а не стену/полки.</p>
  <div class="tabs" id="fb-bgTabs"></div>
  <div class="stage-outer" id="fb-stageOuter"></div>
  <div class="panel">
    <table>
      <thead><tr><th>minX</th><th>maxX</th><th>верх (topY)</th><th>низ (bottomY)</th></tr></thead>
      <tbody id="fb-floorRow"></tbody>
    </table>
    <div class="btnrow">
      <button class="act reset" id="fb-resetFloorBtn">🔄 Сбросить к дефолту этого фона</button>
    </div>
  </div>

  <h2>2. Как кот лежит в лежанке</h2>
  <p class="lead">Перетащите кота так, чтобы он лежал именно на подушке лежанки, а не проваливался ниже или висел над ней. Круглая точка снизу лежанки — потянуть, чтобы изменить размер лежанки на экране (кот подстроится под неё же).</p>
  <div class="bed-stage" id="fb-bedStage">
    <img class="bed-img" id="fb-bedImg" src="bed-calibrate-assets/cat-bed.png" alt="лежанка">
    <div class="bed-resize" id="fb-bedResize"></div>
    <img class="bed-cat" id="fb-bedCat" src="" alt="кот" draggable="false">
    <div class="bed-cat-mark" id="fb-bedCatMark"></div>
  </div>
  <div class="lie-poses" id="fb-liePoses"></div>
  <div class="panel">
    <table>
      <thead><tr><th>Высота лежанки (BED_H)</th><th>Доля посадки (BED_SIT_FRAC)</th><th>Смещение по X (BED_OFFSET_X)</th></tr></thead>
      <tbody id="fb-bedRow"></tbody>
    </table>
    <div class="btnrow">
      <button class="act reset" id="fb-resetBedBtn">🔄 Сбросить лежанку</button>
    </div>
  </div>

  <div class="panel">
    <h3>📋 Итог для отправки</h3>
    <div class="btnrow">
      <button class="act copy" id="fb-copyBtn">📋 Скопировать код</button>
    </div>
    <textarea id="fb-out" readonly placeholder="Нажмите «Скопировать код» — здесь появится текст для отправки"></textarea>
  </div>
</div>
</div>
`;

  // ── 1. Зона пола (по фону) ──────────────────────────────────────────
  const FLOOR_KEY = 'ozongame_floor_calib_v1';
  let floorState = null;
  try { floorState = JSON.parse(localStorage.getItem(FLOOR_KEY)); } catch (e) {}
  if (!floorState) floorState = {};
  BACKGROUNDS.forEach((b) => { if (!floorState[b.key]) floorState[b.key] = defaultFloor(); });

  let curBg = BACKGROUNDS[0].key;
  const bgTabsEl = root.querySelector('#fb-bgTabs');
  const stageOuter = root.querySelector('#fb-stageOuter');

  function saveFloor() { try { localStorage.setItem(FLOOR_KEY, JSON.stringify(floorState)); } catch (e) {} }
  function getScale() { return stageOuter.getBoundingClientRect().width / CONTENT_W; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  BACKGROUNDS.forEach((b) => {
    const btn = document.createElement('button');
    btn.textContent = b.label;
    btn.className = b.key === curBg ? 'active' : '';
    btn.dataset.key = b.key;
    btn.onclick = () => { curBg = b.key; renderBgTabs(); buildStage(); };
    bgTabsEl.appendChild(btn);
  });
  function renderBgTabs() { [...bgTabsEl.children].forEach((btn) => btn.classList.toggle('active', btn.dataset.key === curBg)); }

  function buildStage() {
    stageOuter.innerHTML = '';
    const bgDef = BACKGROUNDS.find((b) => b.key === curBg);
    const img = document.createElement('img');
    img.className = 'bg';
    img.src = `zone-calibrate-assets/${bgDef.file}`;
    stageOuter.appendChild(img);
    makeFloorBox(floorState[curBg]);
    updateFloorReadout();
  }

  function makeFloorBox(z) {
    const box = document.createElement('div');
    box.className = 'floorbox';
    const lab = document.createElement('div'); lab.className = 'label'; lab.textContent = 'пол';
    box.appendChild(lab);
    const hL = document.createElement('div'); hL.className = 'fh left';
    const hR = document.createElement('div'); hR.className = 'fh right';
    const hT = document.createElement('div'); hT.className = 'fh top';
    const hB = document.createElement('div'); hB.className = 'fh bottom';
    box.appendChild(hL); box.appendChild(hR); box.appendChild(hT); box.appendChild(hB);
    stageOuter.appendChild(box);

    function render() {
      const scale = getScale();
      box.style.left = (z.minX * scale) + 'px';
      box.style.width = ((z.maxX - z.minX) * scale) + 'px';
      box.style.top = (z.topY * scale) + 'px';
      box.style.height = ((z.bottomY - z.topY) * scale) + 'px';
    }
    render();

    let mode = null, startPX = 0, startPY = 0, start = {}, dragScale = 1;
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      start = { minX: z.minX, maxX: z.maxX, topY: z.topY, bottomY: z.bottomY };
      dragScale = getScale();
      box.setPointerCapture(e.pointerId);
    }
    box.addEventListener('pointerdown', (e) => down(e, 'move'));
    hL.addEventListener('pointerdown', (e) => down(e, 'left'));
    hR.addEventListener('pointerdown', (e) => down(e, 'right'));
    hT.addEventListener('pointerdown', (e) => down(e, 'top'));
    hB.addEventListener('pointerdown', (e) => down(e, 'bottom'));
    box.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const dx = (e.clientX - startPX) / dragScale;
      const dy = (e.clientY - startPY) / dragScale;
      if (mode === 'move') {
        const w = start.maxX - start.minX, h = start.bottomY - start.topY;
        z.minX = clamp(Math.round(start.minX + dx), 0, CONTENT_W - w);
        z.maxX = z.minX + w;
        z.topY = clamp(Math.round(start.topY + dy), 0, 810 - h);
        z.bottomY = z.topY + h;
      } else if (mode === 'left') {
        z.minX = clamp(Math.round(start.minX + dx), 0, z.maxX - 40);
      } else if (mode === 'right') {
        z.maxX = clamp(Math.round(start.maxX + dx), z.minX + 40, CONTENT_W);
      } else if (mode === 'top') {
        z.topY = clamp(Math.round(start.topY + dy), 0, z.bottomY - 20);
      } else if (mode === 'bottom') {
        z.bottomY = clamp(Math.round(start.bottomY + dy), z.topY + 20, 810);
      }
      render(); updateFloorReadout(); saveFloor();
    });
    box.addEventListener('pointerup', () => { mode = null; });
  }

  function updateFloorReadout() {
    const z = floorState[curBg];
    root.querySelector('#fb-floorRow').innerHTML =
      `<tr><td>${z.minX}</td><td>${z.maxX}</td><td>${z.topY}</td><td>${z.bottomY}</td></tr>`;
  }

  root.querySelector('#fb-resetFloorBtn').onclick = () => {
    floorState[curBg] = defaultFloor();
    saveFloor();
    buildStage();
  };

  // ── 2. Посадка кота в лежанку ────────────────────────────────────────
  const BED_KEY = 'ozongame_bed_sit_calib_v1';
  let bedState = null;
  try { bedState = JSON.parse(localStorage.getItem(BED_KEY)); } catch (e) {}
  if (!bedState) bedState = defaultBed();
  let curLie = 0;

  function saveBed() { try { localStorage.setItem(BED_KEY, JSON.stringify(bedState)); } catch (e) {} }

  const bedStageEl = root.querySelector('#fb-bedStage');
  const bedImgEl = root.querySelector('#fb-bedImg');
  const bedResizeEl = root.querySelector('#fb-bedResize');
  const bedCatEl = root.querySelector('#fb-bedCat');
  const bedCatMarkEl = root.querySelector('#fb-bedCatMark');
  const liePosesEl = root.querySelector('#fb-liePoses');

  LIE_POSES.forEach((i) => {
    const btn = document.createElement('button');
    btn.textContent = 'Поза ' + (i + 1);
    btn.className = i === curLie ? 'active' : '';
    btn.dataset.i = i;
    btn.onclick = () => { curLie = i; renderLiePoses(); renderBedStage(); };
    liePosesEl.appendChild(btn);
  });
  function renderLiePoses() { [...liePosesEl.children].forEach((b) => b.classList.toggle('active', Number(b.dataset.i) === curLie)); }

  // «пол» в системе координат мини-сцены лежанки — низ картинки, там же, где
  // в игре стоит FLOOR_Y (нижний край лежанки садится на пол ровно так же,
  // как в самой аптеке — см. bedStyle в CatsLayer.vue: top = bedPos.y - BED_H)
  const BED_FLOOR_Y = 240;
  function renderBedStage() {
    bedImgEl.style.left = '50%';
    bedImgEl.style.height = bedState.bedH + 'px';
    bedImgEl.style.bottom = (300 - BED_FLOOR_Y) + 'px';
    bedResizeEl.style.left = '50%';
    bedResizeEl.style.top = (BED_FLOOR_Y - bedState.bedH) + 'px';

    bedCatEl.src = CAT_FP + 'lie-' + curLie + '.png';
    const w = LIE_W * LIE_SCALE, h = LIE_H * LIE_SCALE;
    const centerX = bedStageEl.clientWidth / 2 + bedState.offsetX;
    const feetY = BED_FLOOR_Y - Math.round(bedState.bedH * bedState.sitFrac);
    bedCatEl.style.width = w + 'px';
    bedCatEl.style.height = h + 'px';
    bedCatEl.style.left = centerX + 'px';
    bedCatEl.style.top = (feetY - h) + 'px';
    bedCatMarkEl.style.left = centerX + 'px';
    bedCatMarkEl.style.top = feetY + 'px';

    root.querySelector('#fb-bedRow').innerHTML =
      `<tr><td>${bedState.bedH}px</td><td>${bedState.sitFrac.toFixed(2)}</td><td>${bedState.offsetX}px</td></tr>`;
  }

  // тащим кота мышью — вертикально меняем sitFrac, горизонтально — offsetX
  let draggingCat = false, dragStartX = 0, dragStartY = 0, startFrac = 0, startOffsetX = 0;
  bedCatEl.addEventListener('pointerdown', (e) => {
    draggingCat = true; dragStartX = e.clientX; dragStartY = e.clientY;
    startFrac = bedState.sitFrac; startOffsetX = bedState.offsetX;
    bedCatEl.setPointerCapture(e.pointerId);
  });
  bedCatEl.addEventListener('pointermove', (e) => {
    if (!draggingCat) return;
    const dy = e.clientY - dragStartY;
    const dx = e.clientX - dragStartX;
    bedState.sitFrac = clamp(+(startFrac + dy / bedState.bedH).toFixed(3), 0, 1);
    bedState.offsetX = clamp(Math.round(startOffsetX + dx), -60, 60);
    renderBedStage(); saveBed();
  });
  bedCatEl.addEventListener('pointerup', () => { draggingCat = false; });

  // тащим ручку снизу лежанки — меняем размер лежанки на экране (BED_H)
  let resizingBed = false, resizeStartY = 0, startBedH = 0;
  bedResizeEl.addEventListener('pointerdown', (e) => {
    resizingBed = true; resizeStartY = e.clientY; startBedH = bedState.bedH;
    bedResizeEl.setPointerCapture(e.pointerId);
  });
  bedResizeEl.addEventListener('pointermove', (e) => {
    if (!resizingBed) return;
    const dy = resizeStartY - e.clientY; // тянем вверх — лежанка больше
    bedState.bedH = clamp(Math.round(startBedH + dy), 30, 160);
    renderBedStage(); saveBed();
  });
  bedResizeEl.addEventListener('pointerup', () => { resizingBed = false; });

  root.querySelector('#fb-resetBedBtn').onclick = () => {
    bedState = defaultBed();
    saveBed();
    renderBedStage();
  };

  // ── копирование итога ──────────────────────────────────────────────
  root.querySelector('#fb-copyBtn').onclick = () => {
    let out = '// зона пола (где можно ставить лежанку/когтеточку/миски), по фонам:\n';
    BACKGROUNDS.forEach((b) => {
      const z = floorState[b.key];
      out += `// ${b.label} (${b.key}): minX:${z.minX}, maxX:${z.maxX}, topY:${z.topY}, bottomY:${z.bottomY}\n`;
    });
    out += `\n// посадка кота в лежанку:\nBED_H = ${bedState.bedH}\nBED_SIT_FRAC = ${bedState.sitFrac}\nBED_OFFSET_X = ${bedState.offsetX}\n`;
    const el = root.querySelector('#fb-out');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
  renderLiePoses();
  renderBedStage();
  if (window.__floorbedResizeHandler) window.removeEventListener('resize', window.__floorbedResizeHandler);
  window.__floorbedResizeHandler = () => buildStage();
  window.addEventListener('resize', window.__floorbedResizeHandler);
}

</script>
<script>
function renderShelfItemsTab(root) {
  // NATIVE_W/H — родной размер фона (1920x810). CONTENT_W/H — то, что реально видит
  // игрок внутри .pharmacy-content (см. PharmacyView.vue: .pharmacy-wrapper показывает
  // фон в родном размере, .pharmacy-content — центрированное окно 1200 шириной внутри
  // него; отступ слева ровно (1920-1200)/2=360 — см. NATIVE_OFFSET_X). Координаты
  // предметов (x/y) всегда в системе координат ИГРЫ (content-space), а сцена в этой
  // вкладке теперь рисует ВЕСЬ фон целиком (как видел бы игрок на широком экране),
  // просто помечая границу content-области пунктиром — так видно ВЕСЬ стеллаж
  // целиком, а не только его обрезанный кусок.
  const NATIVE_W = 1920, NATIVE_H = 810, CONTENT_W = 1200, CONTENT_H = 810;
  const NATIVE_OFFSET_X = (NATIVE_W - CONTENT_W) / 2; // 360
  // Границы для перетаскивания/растяжения этажей и товаров — намеренно ШИРЕ
  // .pharmacy-content (0..1200): часть новых товаров по плану стоит и за этим
  // блоком (по всей ширине фона, 1920px), поэтому тут разрешаем весь нативный
  // диапазон в content-координатах. Синий пунктир на сцене по-прежнему
  // показывает, где именно проходит граница «видно в игре» — это просто
  // подсказка, а не запрет.
  const CONTENT_MIN_X = -NATIVE_OFFSET_X; // -360
  const CONTENT_MAX_X = NATIVE_W - NATIVE_OFFSET_X; // 1560

  // текущие координаты из CatsLayer.vue (SHELF_TOP_SLOTS_BY_PHARMACY) — старт разметки,
  // не «правда в последней инстанции»: именно их и предлагается перетащить на нужное место
  const DEFAULT_ITEM_H = 54; // высота по умолчанию — совпадает с SHELF_ITEM_H в CatsLayer.vue
  function defaultItems(ph) {
    if (ph === 1) {
      return [
        { id: 't1-0', x: 310, y: 204, img: 0, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-1', x: 390, y: 204, img: 1, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-2', x: 310, y: 280, img: 2, box: true, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-3', x: 390, y: 280, img: 3, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-4', x: 310, y: 356, img: 4, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-5', x: 390, y: 356, img: 2, box: true, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-6', x: 837, y: 201, img: 6, box: true, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-7', x: 917, y: 201, img: 7, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-8', x: 837, y: 277, img: 8, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-9', x: 917, y: 277, img: 9, box: true, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-10', x: 837, y: 353, img: 1, box: false, rot: 0, h: DEFAULT_ITEM_H },
        { id: 't1-11', x: 917, y: 353, img: 4, box: false, rot: 0, h: DEFAULT_ITEM_H },
      ];
    }
    return [
      { id: 't2-0', x: 310, y: 204, img: 0, box: false, rot: 0, h: DEFAULT_ITEM_H },
      { id: 't2-1', x: 390, y: 204, img: 1, box: false, rot: 0, h: DEFAULT_ITEM_H },
      { id: 't2-2', x: 310, y: 280, img: 2, box: true, rot: 0, h: DEFAULT_ITEM_H },
      { id: 't2-3', x: 390, y: 280, img: 3, box: false, rot: 0, h: DEFAULT_ITEM_H },

      e.stopPropagation();
      const idx = tiersState[current].indexOf(t);
      if (idx !== -1) tiersState[current].splice(idx, 1);
      saveTiers();
      buildStage();
    });

    let mode = null, startPX = 0, startPY = 0, start = {}, dragScale = 1;
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      start = { x0: t.x0, x1: t.x1, yTop: t.yTop, yBottom: t.yBottom };
      dragScale = getScale();
      el.setPointerCapture(e.pointerId);
    }
    el.addEventListener('pointerdown', (e) => down(e, 'move'));
    hL.addEventListener('pointerdown', (e) => down(e, 'left'));
    hR.addEventListener('pointerdown', (e) => down(e, 'right'));
    hT.addEventListener('pointerdown', (e) => down(e, 'top'));
    hB.addEventListener('pointerdown', (e) => down(e, 'bottom'));
    el.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const dx = (e.clientX - startPX) / dragScale;
      const dy = (e.clientY - startPY) / dragScale;
      if (mode === 'move') {
        const w = start.x1 - start.x0, h = start.yBottom - start.yTop;
        t.x0 = clamp(Math.round(start.x0 + dx), CONTENT_MIN_X, CONTENT_MAX_X - w);
        t.x1 = t.x0 + w;
        t.yTop = clamp(Math.round(start.yTop + dy), 0, CONTENT_H - h);
        t.yBottom = t.yTop + h;
      } else if (mode === 'left') {
        t.x0 = clamp(Math.round(start.x0 + dx), CONTENT_MIN_X, t.x1 - 30);
      } else if (mode === 'right') {
        t.x1 = clamp(Math.round(start.x1 + dx), t.x0 + 30, CONTENT_MAX_X);
      } else if (mode === 'top') {
        t.yTop = clamp(Math.round(start.yTop + dy), 0, t.yBottom - 20);
      } else if (mode === 'bottom') {
        t.yBottom = clamp(Math.round(start.yBottom + dy), t.yTop + 20, CONTENT_H);
      }
      render();
      saveTiers();
    });
    el.addEventListener('pointerup', () => { mode = null; });
  }

  // Авторасстановка: для каждого этажа — ряд товаров, масштабированных по
  // РЕАЛЬНЫМ пропорциям содержимого (ITEM_META.ratio), с небольшим случайным
  // разбросом (лёгкое дрожание по Y, вариация зазора, иногда лёгкий наклон у
  // некоронных товаров) — чтобы выглядело как настоящая живая полка, а не
  // ряд одинаковых иконок под линейку. Заполняем ряд слева направо, пока
  // влезает; последний неполный проход центрируем.
  function autoArrangeItems() {
    const tiers = tiersState[current] || [];
    if (!tiers.length) { alert('Сначала нарисуйте хотя бы один этаж (кнопка «Добавить этаж»).'); return; }
    const ph = curBgDef().ph;
    const newItems = [];
    let seq = 0;
    let imgCursor = 0; // просто чтобы соседние товары на одном этаже не повторялись подряд
    tiers.forEach((t) => {
      const tierW = t.x1 - t.x0;
      const tierH = t.yBottom - t.yTop;
      const targetH = clamp(Math.round(tierH * 0.86), 26, 120);
      const gapBase = Math.max(6, Math.round(targetH * 0.14));

      // сначала прикидываем ряд товаров, пока не кончится ширина. Если очередной
      // кандидат не влезает (например попался лежачий тюбик, а осталась узкая
      // щель) — не сдаёмся на этом этаже, а пробуем СЛЕДУЮЩИЙ по циклу товар:
      // среди них есть и узкие (высокие бутылки), которые ещё вполне влезут.
      const row = [];
      let usedW = 0;
      let guard = 0;
      let misses = 0;
      while (guard++ < 60 && misses < 24) {
        const imgIdx = AVAILABLE_IMG_INDICES[imgCursor % AVAILABLE_IMG_INDICES.length];
        imgCursor++;
        const meta = ITEM_META[imgIdx];
        const h = clamp(targetH + (Math.round(Math.random() * 10) - 5), 22, 130);
        const w = h * meta.ratio;
        const gap = gapBase + Math.round(Math.random() * gapBase * 0.6);
        const nextUsed = usedW + (row.length ? gap : 0) + w;
        if (nextUsed > tierW) { misses++; continue; }
        row.push({ imgIdx, meta, h, w, gap: row.length ? gap : 0 });
        usedW = nextUsed;
        misses = 0; // успешная вставка — сбрасываем счётчик подряд идущих промахов
      }
      if (!row.length) return;

      // центрируем весь ряд по ширине этажа
      let cursorX = t.x0 + (tierW - usedW) / 2;
      row.forEach((r) => {
        cursorX += r.gap;
        const cx = cursorX + r.w / 2;
        // лёгкое дрожание по высоте — база не идеально по линейке
        const yJitter = Math.round(Math.random() * 4) - 2;
        // тюбики (ratio>1.3, не box) и так лежат на боку в файле — доп. поворот
        // не нужен; у box:true никогда не крутим; у остальных (банки/бутылки)
        // изредка лёгкий наклон для естественности
        let rot = 0;
        if (!r.meta.box && r.meta.ratio < 1.3 && Math.random() < 0.35) {
          rot = (Math.random() < 0.5 ? -1 : 1) * (2 + Math.round(Math.random() * 4));
        }
        seq++;
        newItems.push({
          id: `t${ph}-${seq - 1}`,
          x: Math.round(cx),
          y: t.yBottom + yJitter,
          img: r.imgIdx,
          box: r.meta.box,
          rot,
          h: r.h,
        });
        cursorX += r.w;
      });
    });

    state[current] = newItems;
    selectedId = null;
    save();
    buildStage();
  }

  root.querySelector('#si-addTierBtn').onclick = () => {
    const list = tiersState[current];
    // новый этаж наследует РАЗМЕР (ширину и высоту) последнего добавленного —
    // заказчик подгоняет первый этаж под реальные линии полки на картинке, а
    // остальные обычно той же высоты/ширины (одинаковые полки стеллажа); раньше
    // каждый новый этаж всегда получал фиксированные 500×70 независимо от того,
    // что реально подогнал заказчик, — приходилось растягивать каждый заново.
    const prev = list[list.length - 1];
    const w = prev ? prev.x1 - prev.x0 : 500;
    const h = prev ? prev.yBottom - prev.yTop : 70;
    const x0 = prev ? prev.x0 : 350;
    const yTop = prev ? prev.yBottom + 40 : 200;
    list.push({ x0, x1: x0 + w, yTop, yBottom: yTop + h });
    saveTiers();
    buildStage();
  };
  root.querySelector('#si-autoArrangeBtn').onclick = autoArrangeItems;

  function makeItem(it) {
    if (it.rot == null) it.rot = 0;
    if (it.h == null) it.h = DEFAULT_ITEM_H;
    const el = document.createElement('div');
    el.className = 'item';
    el.dataset.id = it.id;
    const img = document.createElement('img');
    img.src = `shelf-calibrate-assets/products/item${it.img}.png`;
    el.appendChild(img);
    const tag = document.createElement('div'); tag.className = 'tag'; tag.textContent = it.id;
    el.appendChild(tag);
    const rotBtn = document.createElement('button');
    rotBtn.className = 'rotbtn';
    rotBtn.type = 'button';
    rotBtn.textContent = '⟲';
    rotBtn.title = 'Повернуть на 90° против часовой стрелки';
    el.appendChild(rotBtn);
    const sizeHandle = document.createElement('div');
    sizeHandle.className = 'sizehandle';
    sizeHandle.title = 'Потяните — изменить размер товара';
    el.appendChild(sizeHandle);
    const delBtn = document.createElement('button');
    delBtn.className = 'delbtn';
    delBtn.type = 'button';
    delBtn.textContent = '×';
    delBtn.title = 'Удалить этот товар';
    delBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteItems([it.id]); });
    el.appendChild(delBtn);
    stageOuter.appendChild(el);

    function render() {
      const scale = getScale();
      el.style.left = (toNativeX(it.x) * scale) + 'px';
      el.style.top = (it.y * scale) + 'px';
      el.style.transform = `translate(-50%,-100%) rotate(${it.rot}deg)`;
      img.style.height = (it.h * scale) + 'px';
      el.classList.toggle('selected', it.id === selectedId);
    }
    render();
    el._render = render;

    rotBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    rotBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      it.rot = ((it.rot - 90) % 360 + 360) % 360;
      render();
      renderRows();
      save();
    });

    // ручка размера — тянуть вниз/вверх, меняет высоту иконки (px в системе
    // координат игры, не экранных); диапазон подобран так, чтобы не давать
    // сделать товар нелепо огромным/микроскопическим на полке
    let resizing = false, resizeStartY = 0, startH = 0, resizeScale = 1;
    sizeHandle.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      resizing = true; resizeStartY = e.clientY; startH = it.h; resizeScale = getScale();
      sizeHandle.setPointerCapture(e.pointerId);
    });
    sizeHandle.addEventListener('pointermove', (e) => {
      if (!resizing) return;
      const dy = (e.clientY - resizeStartY) / resizeScale;
      it.h = clamp(Math.round(startH + dy), 24, 140);
      render();
      renderRows();
      save();
    });
    sizeHandle.addEventListener('pointerup', () => { resizing = false; });

    let dragging = false, startPX = 0, startPY = 0, startX = 0, startY = 0, dragScale = 1;
    el.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      selectedId = it.id;
      dragging = true; startPX = e.clientX; startPY = e.clientY;
      startX = it.x; startY = it.y; dragScale = getScale();
      el.setPointerCapture(e.pointerId);
      renderRows();
      [...stageOuter.querySelectorAll('.item')].forEach((n) => n.classList.toggle('selected', n.dataset.id === selectedId));
    });
    el.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dx = (e.clientX - startPX) / dragScale;
      const dy = (e.clientY - startPY) / dragScale;
      it.x = clamp(Math.round(startX + dx), CONTENT_MIN_X, CONTENT_MAX_X);
      it.y = clamp(Math.round(startY + dy), 0, CONTENT_H);
      render();
      renderRows();
      save();
    });
    el.addEventListener('pointerup', () => { dragging = false; });
  }

  function renderRows() {
    root.querySelector('#si-phLabel').textContent = curBgDef().ph;
    const tbody = root.querySelector('#si-rowsBody');
    tbody.innerHTML = '';
    state[current].forEach((it) => {
      const tr = document.createElement('tr');
      tr.className = (it.id === selectedId ? 'selected ' : '') + (markedIds.has(it.id) ? 'marked' : '');
      tr.innerHTML = `
        <td class="markcell"></td>
        <td>${it.id}</td>
        <td>item${it.img}.png</td>
        <td class="numcell">${it.x}</td>
        <td class="numcell">${it.y}</td>
        <td class="numcell">${it.rot || 0}°</td>
        <td></td>
        <td></td>
        <td></td>
      `;
      const markTd = tr.children[0];
      const markCb = document.createElement('input');
      markCb.type = 'checkbox';
      markCb.checked = markedIds.has(it.id);
      markCb.addEventListener('click', (e) => e.stopPropagation());
      markCb.addEventListener('change', () => {
        if (markCb.checked) markedIds.add(it.id); else markedIds.delete(it.id);
        tr.classList.toggle('marked', markCb.checked);
        updateMarkCount();
      });
      markTd.appendChild(markCb);
      const sizeTd = tr.children[6];
      const sizeInput = document.createElement('input');
      sizeInput.type = 'number';
      sizeInput.min = '24'; sizeInput.max = '140';
      sizeInput.value = it.h || DEFAULT_ITEM_H;
      sizeInput.addEventListener('change', () => {
        it.h = clamp(Math.round(Number(sizeInput.value) || DEFAULT_ITEM_H), 24, 140);
        sizeInput.value = it.h;
        save();
        const el = stageOuter.querySelector(`.item[data-id="${it.id}"]`);
        if (el && el._render) el._render();
      });
      sizeTd.appendChild(sizeInput);
      const boxTd = tr.children[7];
      const boxBtn = document.createElement('button');
      boxBtn.className = 'boxtoggle' + (it.box ? ' on' : '');
      boxBtn.textContent = it.box ? 'коробка ✓' : 'круглый/тюбик';
      boxBtn.onclick = () => { it.box = !it.box; save(); renderRows(); };
      boxTd.appendChild(boxBtn);
      const catTd = tr.children[8];
      const catBtn = document.createElement('button');
      catBtn.className = 'boxtoggle' + (it.cat ? ' on' : '');
      catBtn.textContent = it.cat ? '🐱 сбивает ✓' : 'декор';
      catBtn.onclick = () => { it.cat = !it.cat; save(); renderRows(); };
      catTd.appendChild(catBtn);
      tr.addEventListener('click', (e) => {
        if (e.target === boxTd || e.target === boxBtn || e.target === catTd || e.target === catBtn || e.target === sizeInput) return;
        selectedId = it.id;
        renderRows();
        [...stageOuter.querySelectorAll('.item')].forEach((n) => { n.classList.toggle('selected', n.dataset.id === selectedId); if (n._render) n._render(); });
      });
      tbody.appendChild(tr);
    });
    updateMarkCount();
  }

  function updateMarkCount() {
    const n = state[current].filter((it) => markedIds.has(it.id)).length;
    const el = root.querySelector('#si-markCount');
    if (el) el.textContent = n;
  }

  // удалить перечисленные товары (по id) из текущей аптеки
  function deleteItems(ids) {
    if (!ids.length) return;
    const set = new Set(ids);
    state[current] = state[current].filter((it) => !set.has(it.id));
    ids.forEach((id) => markedIds.delete(id));
    if (set.has(selectedId)) selectedId = null;
    save();
    buildStage();
  }

  root.querySelector('#si-delMarkedBtn').onclick = () => {
    const ids = state[current].filter((it) => markedIds.has(it.id)).map((it) => it.id);
    if (!ids.length) { alert('Отметьте галочками товары, которые нужно удалить.'); return; }
    deleteItems(ids);
  };

  root.querySelector('#si-resetBtn').onclick = () => {
    markedIds.clear();
    state[current] = defaultItems(curBgDef().ph);
    save();
    buildStage();
  };

  // отметить «сбивает кот» примерно у половины товаров текущей аптеки (через один
  // по порядку в массиве) — удобная отправная точка, дальше можно поправить вручную
  root.querySelector('#si-markHalfBtn').onclick = () => {
    state[current].forEach((it, i) => { it.cat = i % 2 === 0; });
    save();
    renderRows();
  };

  root.querySelector('#si-copyBtn').onclick = () => {
    let out = '// вкладка «🛒 Полки-товары» — товары с «🐱 сбивает кот» → SHELF_TOP_SLOTS_BY_PHARMACY\n';
    out += '// (CatsLayer.vue, интерактивные), остальные → SLOTS_BY_PHARMACY (ShelfDecorLayer.vue, декор)\n\n';
    out += '// === CatsLayer.vue: SHELF_TOP_SLOTS_BY_PHARMACY ===\n';
    BACKGROUNDS.forEach((b) => {
      out += `${b.ph}: [\n`;
      state[b.key].filter((it) => it.cat).forEach((it) => {
        out += `  { id: '${it.id}', x: ${it.x}, y: ${it.y}, img: SHELF_TOP_ITEMS[${it.img}]${it.box ? ', box: true' : ''}${it.rot ? ', rot: ' + it.rot : ''}${it.h && it.h !== DEFAULT_ITEM_H ? ', h: ' + it.h : ''} },\n`;
      });
      out += `],\n`;
    });
    out += '\n// === ShelfDecorLayer.vue: SLOTS_BY_PHARMACY ===\n';
    BACKGROUNDS.forEach((b) => {
      out += `${b.ph}: [\n`;
      state[b.key].filter((it) => !it.cat).forEach((it) => {
        out += `  { id: '${it.id}', x: ${it.x}, y: ${it.y}, img: ${it.img}${it.box ? ', box: true' : ''}${it.rot ? ', rot: ' + it.rot : ''}${it.h && it.h !== DEFAULT_ITEM_H ? ', h: ' + it.h : ''} },\n`;
      });
      out += `],\n`;
    });
    const el = root.querySelector('#si-codeOut');
    el.value = out;
    el.select();
    try { document.execCommand('copy'); } catch (e) {}
    if (navigator.clipboard) navigator.clipboard.writeText(out).catch(() => {});
  };

  buildStage();
  if (window.__shelfItemsResizeHandler) window.removeEventListener('resize', window.__shelfItemsResizeHandler);
  window.__shelfItemsResizeHandler = () => buildStage();
  window.addEventListener('resize', window.__shelfItemsResizeHandler);
}

</script>
<script>
/* ============================================================
   Мобильные полки — та же механика, что «🛒 Полки-товары» выше
   (перетаскивание, этажи + авторасстановка, экспорт), но для ОТДЕЛЬНОГО
   портретного мобильного фона (roomAI1-empty-mobile.jpg, см. PharmacyView.vue
   → hasMobileArt/wrapperBgStyle). Ключевое отличие: этот фон — уже готовый
   кадр целиком (не кроп широкой картинки), поэтому нет NATIVE_OFFSET_X/
   content-границы — «нативные» координаты этой вкладки ПРЯМО совпадают с
   пикселями самой картинки (1536×2752). В игре эти координаты используются
   в %% (см. mobilePharmacistStyle в PharmacyView.vue — та же логика: leftPct/
   topPct/heightPct от .pharmacy-content), поэтому при экспорте пересчитываем
   px → % от NATIVE_W/NATIVE_H. Пока только аптека 1 — своего мобильного фона
   для аптеки 2 ещё нет (см. комментарий у импорта roomAI1EmptyMobile).
   ============================================================ */
function renderMobileShelfTab(root) {
  const NATIVE_W = 1536, NATIVE_H = 2752; // родной размер roomAI1-empty-mobile.jpg
  const DEFAULT_ITEM_H = 70; // чуть крупнее десктопных 54 — на телефоне полки крупнее в кадре

  const ITEM_META = [
    { ratio: 2.15, box: false }, { ratio: 0.65, box: false }, { ratio: 1.56, box: true },
    { ratio: 0.81, box: false }, { ratio: 0.53, box: false }, { ratio: 0.58, box: false },
    { ratio: 0.92, box: true }, { ratio: 2.51, box: false }, { ratio: 0.48, box: false },
    { ratio: 2.19, box: true }, { ratio: 1.01, box: false }, { ratio: 0.80, box: false },
  ];
  const AVAILABLE_IMG_INDICES = [0, 1, 2, 3, 4, 6, 7, 8, 9];

  const STORE_KEY = 'ozongame_mobileshelf_items_v1';
  const TIER_KEY = 'ozongame_mobileshelf_tiers_v1';
  let items = null;
  try { items = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
  if (!Array.isArray(items)) items = [];
  let tiers = null;
  try { tiers = JSON.parse(localStorage.getItem(TIER_KEY)); } catch (e) {}
  if (!Array.isArray(tiers)) tiers = [];
  function save() { try { localStorage.setItem(STORE_KEY, JSON.stringify(items)); } catch (e) {} }
  function saveTiers() { try { localStorage.setItem(TIER_KEY, JSON.stringify(tiers)); } catch (e) {} }

  // «Нижняя полка, поштучно» — отдельный слой от этажей: сюда допрыгивает
  // КОТЁНОК (не подросток) и сбивает ровно ОДИН товар за раз (см.
  // SHELF_SLOTS_BY_PHARMACY в CatsLayer.vue — на десктопе всего 4 товара на
  // аптеку, захардкожено, инструмента для расстановки не было вообще).
  // Обычно немного штук, ставятся руками по одному — без этажей/авторасстановки.
  const KITTEN_KEY = 'ozongame_mobileshelf_kitten_v1';
  const KITTEN_ITEM_H = 55;
  let kittenItems = null;
  try { kittenItems = JSON.parse(localStorage.getItem(KITTEN_KEY)); } catch (e) {}
  if (!Array.isArray(kittenItems)) kittenItems = [];
  function saveKitten() { try { localStorage.setItem(KITTEN_KEY, JSON.stringify(kittenItems)); } catch (e) {} }
  let kittenSeq = kittenItems.length;

  let selectedId = null;
  const markedIds = new Set();

  root.innerHTML = `
<style>
  .tab-mobshelf{margin:0;font-family:'Comfortaa',system-ui,sans-serif;color:var(--ink);background:var(--bg2);padding:20px;}
  .tab-mobshelf .wrap{max-width:900px;margin:0 auto;}
  .tab-mobshelf h1{font-size:21px;margin:0 0 6px;}
  .tab-mobshelf p.lead{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 14px;}
  .tab-mobshelf .note{background:rgba(252,190,46,.12);border:1px solid rgba(252,190,46,.4);border-radius:12px;padding:11px 14px;font-size:12.5px;color:#f3c869;margin-bottom:16px;line-height:1.55;}
  .tab-mobshelf .stage-outer{width:100%;max-width:460px;margin:0 auto;aspect-ratio:${NATIVE_W}/${NATIVE_H};position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 24px rgba(39,56,74,.2);background:rgba(95,168,236,.14);}
  .tab-mobshelf .stage-outer img.bg{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}
  .tab-mobshelf .tierbox{position:absolute;border:2px dashed var(--green);border-radius:6px;background:rgba(47,178,122,.12);cursor:move;pointer-events:auto;}
  .tab-mobshelf .tierbox .label{position:absolute;left:4px;top:-20px;font-size:10.5px;font-weight:700;background:#1c8158;color:#fff;padding:2px 7px;border-radius:6px;white-space:nowrap;}
  .tab-mobshelf .tierbox .tierdel{position:absolute;right:-10px;top:-10px;width:20px;height:20px;border-radius:50%;background:#e8635f;color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;pointer-events:auto;}

  const stageOuter = root.querySelector('#ms-stageOuter');

  function buildStage() {
    stageOuter.innerHTML = '';

  function makeTierBox(t, index) {
    const el = document.createElement('div');
    el.className = 'tierbox';
    const label = document.createElement('div'); label.className = 'label'; label.textContent = 'Этаж ' + (index + 1);
    el.appendChild(label);

    const hT = document.createElement('div'); hT.className = 'th top';
    const hB = document.createElement('div'); hB.className = 'th bottom';
    el.appendChild(hL); el.appendChild(hR); el.appendChild(hT); el.appendChild(hB);
    stageOuter.appendChild(el);

    function render() {
      const scale = getScale();
      el.style.left = (t.x0 * scale) + 'px';
      el.style.width = ((t.x1 - t.x0) * scale) + 'px';
      el.style.top = (t.yTop * scale) + 'px';
      el.style.height = ((t.yBottom - t.yTop) * scale) + 'px';
    }
    render();

    delBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = tiers.indexOf(t);
      if (idx !== -1) tiers.splice(idx, 1);
      saveTiers();
      buildStage();
    });

    let mode = null, startPX = 0, startPY = 0, start = {}, dragScale = 1;
    function down(e, m) {
      e.stopPropagation();
      mode = m; startPX = e.clientX; startPY = e.clientY;
      start = { x0: t.x0, x1: t.x1, yTop: t.yTop, yBottom: t.yBottom };
      dragScale = getScale();
      el.setPointerCapture(e.pointerId);
    }
    el.addEventListener('pointerdown', (e) => down(e, 'move'));
    hL.addEventListener('pointerdown', (e) => down(e, 'left'));
    hR.addEventListener('pointerdown', (e) => down(e, 'right'));
    hT.addEventListener('pointerdown', (e) => down(e, 'top'));
    hB.addEventListener('pointerdown', (e) => down(e, 'bottom'));
    el.addEventListener('pointermove', (e) => {
      if (!mode) return;
      const dx = (e.clientX - startPX) / dragScale;
      const dy = (e.clientY - startPY) / dragScale;
      if (mode === 'move') {
        const w = start.x1 - start.x0, h = start.yBottom - start.yTop;
        t.x0 = clamp(Math.round(start.x0 + dx), 0, NATIVE_W - w);
        t.x1 = t.x0 + w;
        t.yTop = clamp(Math.round(start.yTop + dy), 0, NATIVE_H - h);
        t.yBottom = t.yTop + h;
      } else if (mode === 'left') {
        t.x0 = clamp(Math.round(start.x0 + dx), 0, t.x1 - 30);
      } else if (mode === 'right') {
        t.x1 = clamp(Math.round(start.x1 + dx), t.x0 + 30, NATIVE_W);
      } else if (mode === 'top') {
        t.yTop = clamp(Math.round(start.yTop + dy), 0, t.yBottom - 20);
      } else if (mode === 'bottom') {
        t.yBottom = clamp(Math.round(start.yBottom + dy), t.yTop + 20, NATIVE_H);
      }
      render();
      saveTiers();
    });
    el.addEventListener('pointerup', () => { mode = null; });
  }

  function autoArrangeItems() {
    if (!tiers.length) { alert('Сначала нарисуйте хотя бы один этаж (кнопка «Добавить этаж»).'); return; }
    const newItems = [];
    let seq = 0;
    let imgCursor = 0;
    tiers.forEach((t) => {
      const tierW = t.x1 - t.x0;
      const tierH = t.yBottom - t.yTop;
      const targetH = clamp(Math.round(tierH * 0.86), 30, 160);
      const gapBase = Math.max(6, Math.round(targetH * 0.14));
      const row = [];
      let usedW = 0;
      let guard = 0;
      let misses = 0;
      while (guard++ < 60 && misses < 24) {
        const imgIdx = AVAILABLE_IMG_INDICES[imgCursor % AVAILABLE_IMG_INDICES.length];
        imgCursor++;
        const meta = ITEM_META[imgIdx];
        const h = clamp(targetH + (Math.round(Math.random() * 10) - 5), 26, 170);
        const w = h * meta.ratio;
        const gap = gapBase + Math.round(Math.random() * gapBase * 0.6);
        const nextUsed = usedW + (row.length ? gap : 0) + w;
        if (nextUsed > tierW) { misses++; continue; }
        row.push({ imgIdx, meta, h, w, gap: row.length ? gap : 0 });
        usedW = nextUsed;
        misses = 0;
      }
      if (!row.length) return;

      let cursorX = t.x0 + (tierW - usedW) / 2;
      row.forEach((r) => {
        cursorX += r.gap;
        const cx = cursorX + r.w / 2;
        const yJitter = Math.round(Math.random() * 4) - 2;
        let rot = 0;
        if (!r.meta.box && r.meta.ratio < 1.3 && Math.random() < 0.35) {
          rot = (Math.random() < 0.5 ? -1 : 1) * (2 + Math.round(Math.random() * 4));
        }
        seq++;
        newItems.push({
          id: `m1-${seq - 1}`,
          x: Math.round(cx),
          y: t.yBottom + yJitter,
          img: r.imgIdx,
          box: r.meta.box,
          rot,
          h: r.h,
        });
        cursorX += r.w;
      });
    });

    items = newItems;
    selectedId = null;
    save();
    buildStage();
  }

      markCb.type = 'checkbox';
